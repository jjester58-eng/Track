<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <link rel="icon" type="image/png" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1b2a">
  <title>Admin — Field Events Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0a0f1a; color: #e0e6f0; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: #0d1b2a; border-bottom: 2px solid #1e3a5f; padding: 12px 18px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .topbar-title { font-size: 18px; font-weight: 800; color: #7eb8f7; letter-spacing: 1px; flex: 1; }
    .card { background: #0d1b2a; border: 1px solid #1e3a5f; border-radius: 14px; padding: 20px; margin: 20px; }
    input, button { padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #2a4a6e; background: #162438; color: white; width: 100%; }
    button { background: #7eb8f7; color: #0d1b2a; font-weight: bold; cursor: pointer; }
    button:hover { background: #9ac8ff; }
    .btn-red { background: #dc3545; color: white; }
    .status-msg { padding: 10px; margin: 10px 0; border-radius: 8px; text-align: center; font-size: 14px; }
    .success { background: #0a2a18; color: #4dca7a; }
    .error { background: #2a0a0a; color: #f87; }
  </style>
</head>
<body>

<div class="topbar">
  <img src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" height="38" alt="Logo">
  <div class="topbar-title">ADMIN / IMPORT</div>
  <a href="index.html" style="color:white; text-decoration:none;">⌂ Home</a>
</div>

<div id="lockScreen" class="card">
  <h3>🔐 Admin Access</h3>
  <input type="password" id="pwInput" placeholder="Enter password (1111)" onkeypress="if(event.key==='Enter') checkPassword()">
  <button onclick="checkPassword()">UNLOCK ADMIN</button>
  <div id="lockError" class="status-msg error" style="display:none;">Incorrect password</div>
</div>

<div id="adminContent" class="hidden">
  <!-- CSV Import -->
  <div class="card">
    <h3>📥 Import Roster (MileSplit CSV)</h3>
    <input type="file" id="csvFile" accept=".csv">
    <button onclick="doImport()">RUN IMPORT</button>
    <div id="importStatus" class="status-msg"></div>
  </div>

  <!-- Image Upload -->
  <div class="card">
    <h3>🖼 Upload Logo / Avatar</h3>
    <input type="file" id="imageFile" accept="image/*">
    <button onclick="uploadImage()">UPLOAD IMAGE</button>
    <div id="imageStatus" class="status-msg"></div>
  </div>

  <!-- Danger Zone -->
  <div class="card">
    <h3>⚠️ Danger Zone</h3>
    <button class="btn-red" onclick="clearMeet()">DELETE ALL MEET DATA</button>
  </div>
</div>

<script>
const sb = supabase.createClient('https://qjomrnguhbqfluzwuntz.supabase.co', 'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_');
const ADMIN_PASSWORD = '1111';

function checkPassword() {
  if (document.getElementById('pwInput').value === ADMIN_PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('adminContent').classList.remove('hidden');
  } else {
    const err = document.getElementById('lockError');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2500);
    document.getElementById('pwInput').value = '';
  }
}

async function doImport() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) return showStatus('importStatus', 'Please select a CSV file', 'error');
  const btn = document.querySelector('#importStatus').parentElement.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'IMPORTING...';

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const text = e.target.result;
      const rows = parseCSV(text);
      // Basic import - adjust columns to match your table
      let count = 0;
      for (let i = 1; i < rows.length; i++) {
        const [name, team, gender, level] = rows[i];
        if (!name) continue;
        const [fname, ...lnameParts] = name.trim().split(' ');
        await sb.from('athletes').insert({
          fname: fname || '',
          lname: lnameParts.join(' ') || '',
          team: team || '',
          gender: gender || '',
          level: level || ''
        });
        count++;
      }
      showStatus('importStatus', `✅ Imported ${count} athletes`, 'success');
    } catch (err) {
      showStatus('importStatus', 'Import failed: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'RUN IMPORT';
    }
  };
  reader.readAsText(file);
}

async function uploadImage() {
  const file = document.getElementById('imageFile').files[0];
  if (!file) return showStatus('imageStatus', 'Select an image first', 'error');

  const fileName = `upload-${Date.now()}-${file.name}`;
  const statusEl = document.getElementById('imageStatus');

  try {
    const { error } = await sb.storage.from('logos').upload(fileName, file);
    if (error) throw error;

    const { data: urlData } = sb.storage.from('logos').getPublicUrl(fileName);
    showStatus('imageStatus', `✅ Uploaded!<br><small>${urlData.publicUrl}</small>`, 'success');
    console.log('New image URL:', urlData.publicUrl);
  } catch (err) {
    showStatus('imageStatus', 'Upload failed: ' + err.message, 'error');
  }
}

function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.innerHTML = msg;
  el.className = `status-msg ${type}`;
}

function parseCSV(text) {
  return text.split(/\r?\n/).map(line => line.split(',').map(field => field.trim().replace(/^"|"$/g, '')));
}

async function clearMeet() {
  if (!confirm('DELETE ALL DATA? This cannot be undone.')) return;
  if (prompt('Type 1111 to confirm') !== '1111') return alert('Cancelled');

  await Promise.all([
    sb.from('attempts').delete().neq('id', '0'),
    sb.from('event_assignments').delete().neq('id', '0'),
    sb.from('athletes').delete().neq('id', '0'),
    sb.from('events').delete().neq('id', '0')
  ]);

  alert('All data cleared.');
  location.reload();
}
</script>
</body>
</html>
