<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <link rel="icon" type="image/png" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07101c">
  <title>Field Events Pro — Powered by Ironclad</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #07101c;
      --bg2:     #0c1b2e;
      --bg3:     #0f2240;
      --border:  #1a3352;
      --border2: #254a72;
      --accent:  #4d9de0;
      --accent2: #7ec8f7;
      --text:    #c8dcf0;
      --text2:   #7a9cbf;
      --text3:   #3a5a7e;
      --green:   #3dd68c;
      --red:     #e05252;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,16,28,0.96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .topbar-brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 900;
      color: var(--accent2); letter-spacing: 3px;
      text-transform: uppercase; flex: 1;
    }
    .topbar-admin {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 800; letter-spacing: 1.5px;
      color: var(--text3); text-decoration: none;
      padding: 5px 12px; border: 1px solid var(--border);
      border-radius: 6px; transition: all .15s; text-transform: uppercase;
    }
    .topbar-admin:hover { color: var(--accent2); border-color: var(--border2); background: var(--bg3); }

    /* ── PAGE CENTER WRAPPER ── */
    .page-wrap {
      max-width: 540px;
      margin: 0 auto;
      padding: 0 16px 60px;
      width: 100%;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 40px 0 28px;
    }
    .hero-logo {
      height: 72px; width: auto;
      display: block; margin: 0 auto 16px;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.5));
      transition: opacity .3s;
    }
    .hero-badge {
      display: inline-block;
      background: rgba(77,157,224,0.10);
      border: 1px solid rgba(77,157,224,0.25);
      color: var(--accent2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 800;
      letter-spacing: 4px; text-transform: uppercase;
      padding: 4px 14px; border-radius: 20px;
      margin-bottom: 14px;
    }
    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(40px, 10vw, 64px);
      font-weight: 900; line-height: 0.92;
      letter-spacing: -0.5px; text-transform: uppercase;
      color: #e8f4ff;
    }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero-sub {
      font-size: 14px; color: var(--text2);
      margin: 12px auto 0; line-height: 1.6;
      max-width: 340px;
    }
    .hero-divider {
      width: 40px; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 20px auto 0; border-radius: 2px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 800;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--text3);
      margin: 28px 0 10px;
    }

    /* ── MEET LIST ── */
    .meet-list {
      display: flex; flex-direction: column; gap: 10px;
    }
    .meet-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex; align-items: center; gap: 14px;
      transition: border-color .15s, background .15s, transform .15s;
    }
    .meet-card:hover  { background: var(--bg3); border-color: var(--accent); transform: translateY(-2px); }
    .meet-card:active { transform: scale(0.98); }
    .meet-card.selected { border-color: var(--accent); background: var(--bg3); }

    .meet-logo {
      width: 48px; height: 48px; border-radius: 9px;
      object-fit: contain; background: var(--bg);
      border: 1px solid var(--border); padding: 3px; flex-shrink: 0;
    }
    .meet-logo-ph {
      width: 48px; height: 48px; border-radius: 9px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .meet-info { flex: 1; min-width: 0; }
    .meet-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 800; color: #d0e8ff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: 0.5px;
    }
    .meet-date { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .meet-arrow { color: var(--text3); font-size: 22px; flex-shrink: 0; transition: color .15s; }
    .meet-card:hover .meet-arrow { color: var(--accent2); }

    /* ── INLINE ROLE PICKER (expands below selected card) ── */
    .role-picker {
      display: none;
      background: var(--bg3);
      border: 1px solid var(--accent);
      border-top: none;
      border-radius: 0 0 14px 14px;
      padding: 16px;
      margin-top: -10px;
      animation: expandDown .18s ease;
    }
    .role-picker.open { display: block; }
    @keyframes expandDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .role-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 0;
    }
    .role-btn {
      padding: 16px 10px; border-radius: 10px;
      border: 1px solid transparent;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      transition: all .15s;
    }
    .role-btn:active { transform: scale(0.96); }
    .role-btn .icon { font-size: 26px; }
    .role-btn .role-sub { font-size: 10px; font-weight: 600; letter-spacing: 1px; opacity: 0.65; text-transform: uppercase; }
    .role-scoring { background: rgba(77,157,224,0.12); border-color: rgba(77,157,224,0.3); color: var(--accent2); }
    .role-scoring:hover { background: rgba(77,157,224,0.22); border-color: var(--accent); }
    .role-results { background: rgba(61,214,140,0.10); border-color: rgba(61,214,140,0.25); color: var(--green); }
    .role-results:hover { background: rgba(61,214,140,0.20); border-color: var(--green); }

    /* ── PIN STEP (inside role picker) ── */
    .pin-step { display: none; }
    .pin-step.open { display: block; }
    .pin-step p { color: var(--text2); font-size: 13px; margin-bottom: 12px; text-align: center; }
    .pin-input {
      width: 100%; padding: 13px; font-size: 28px;
      text-align: center; letter-spacing: 12px;
      background: var(--bg); border: 2px solid var(--border);
      border-radius: 9px; color: #e0ecff; outline: none;
      margin-bottom: 10px; font-family: 'Barlow Condensed', sans-serif;
      transition: border-color .2s;
    }
    .pin-input:focus { border-color: var(--accent); }
    .pin-btn {
      width: 100%; padding: 12px; border: none; border-radius: 9px;
      background: linear-gradient(135deg, #1e5fa8, #164080);
      color: #d0eaff; font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: opacity .15s;
    }
    .pin-btn:hover { opacity: .88; }
    .pin-error { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 16px; text-align: center; }
    .pin-back {
      background: none; border: none; color: var(--text3);
      font-size: 12px; cursor: pointer; padding: 8px 0 0;
      font-family: 'Barlow', sans-serif; display: block; margin: 0 auto;
    }
    .pin-back:hover { color: var(--accent2); }

    /* ── STATES ── */
    .loading-msg { text-align: center; padding: 24px; color: var(--text3); font-size: 14px; }
    .empty-msg {
      text-align: center; padding: 32px 24px;
      background: var(--bg2); border: 1px dashed var(--border);
      border-radius: 14px; color: var(--text3); font-size: 14px;
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center; padding: 32px 20px 48px;
      font-size: 11px; color: var(--text3); margin-top: 20px;
    }
    .footer img { height: 18px; vertical-align: middle; margin-right: 6px; opacity: 0.3; }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <img src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" height="30" alt="">
    <div class="topbar-brand">Field Events Pro</div>
    <a href="admin.html" class="topbar-admin">🔐 Admin</a>
  </div>

  <div class="page-wrap">

    <!-- HERO -->
    <section class="hero">
      <img id="heroLogo"
           src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png"
           alt="Field Events Pro" class="hero-logo">
      <div class="hero-badge">Track &amp; Field · Live Scoring</div>
      <h1>Field<br><em>Events</em><br>Pro</h1>
      <p class="hero-sub">Real-time scoring and live leaderboards for every field event.</p>
      <div class="hero-divider"></div>
    </section>

    <!-- MEET LIST -->
    <div class="section-label">Select Your Meet</div>
    <div class="meet-list" id="meetList">
      <div class="loading-msg">Loading meets…</div>
    </div>

  </div><!-- /page-wrap -->

  <!-- FOOTER -->
  <footer class="footer">
    <img src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" alt="">
    &copy; 2025 Ironclad · Field Events Pro
  </footer>

<script>
// ── Shared constants (must match supabase.js) ─────────────────────────────
const SUPABASE_URL = 'https://qjomrnguhbqfluzwuntz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_';
const FEP_SESSION_KEY = 'fep_meet';
const IRONCLAD_LOGO  = 'https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const meetsMap  = {};
let   selectedId = null;

// ── Shared helpers ────────────────────────────────────────────────────────

/** HTML-escape a value before inserting into a template string. */
function esc(s) {
  return (s || '').toString()
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/** Format a YYYY-MM-DD date string for display. */
function fmtDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  });
}

// ── Load meets ────────────────────────────────────────────────────────────
window.onload = async () => {
  const list = document.getElementById('meetList');
  try {
    const { data: meets, error } = await sb
      .from('meets')
      .select('id, name, date, logo_url')
      .eq('is_active', true)
      .order('date', { ascending: true });

    if (error) throw error;

    if (!meets || !meets.length) {
      list.innerHTML = `<div class="empty-msg">No active meets right now.<br>
        <span style="font-size:12px;margin-top:6px;display:block;">A meet director needs to create one first.</span></div>`;
      return;
    }

    meets.forEach(m => meetsMap[m.id] = m);

    list.innerHTML = meets.map(m => {
      const logo = m.logo_url
        ? `<img src="${esc(m.logo_url)}" class="meet-logo" alt="">`
        : `<div class="meet-logo-ph">🏟</div>`;
      const dateStr = m.date ? fmtDate(m.date) : 'Date TBD';
      return `
        <div>
          <div class="meet-card" id="card-${esc(m.id)}" onclick="toggleMeet('${esc(m.id)}')">
            ${logo}
            <div class="meet-info">
              <div class="meet-name">${esc(m.name)}</div>
              <div class="meet-date">${dateStr}</div>
            </div>
            <div class="meet-arrow">›</div>
          </div>
          <div class="role-picker" id="picker-${esc(m.id)}">
            <div class="role-grid" id="roles-${esc(m.id)}">
              <button class="role-btn role-results" onclick="goLeaderboard('${esc(m.id)}')">
                <span class="icon">📊</span>
                Leaderboard
                <span class="role-sub">No login</span>
              </button>
              <button class="role-btn role-scoring" onclick="showPin('${esc(m.id)}')">
                <span class="icon">📋</span>
                Scoring
                <span class="role-sub">PIN required</span>
              </button>
            </div>
            <div class="pin-step" id="pin-${esc(m.id)}">
              <p>Enter the scoring PIN for this meet.</p>
              <input type="tel" id="pinInput-${esc(m.id)}" class="pin-input"
                     maxlength="6" inputmode="numeric" placeholder="· · · ·"
                     onkeydown="if(event.key==='Enter') submitPin('${esc(m.id)}')">
              <button class="pin-btn" onclick="submitPin('${esc(m.id)}')">Enter Scoring</button>
              <div class="pin-error" id="pinErr-${esc(m.id)}"></div>
              <button class="pin-back" onclick="backToRoles('${esc(m.id)}')">← Back</button>
            </div>
          </div>
        </div>`;
    }).join('');

  } catch(err) {
    console.error(err);
    list.innerHTML = `<div class="empty-msg">Error: ${esc(err.message)}</div>`;
  }
};

// ── Toggle meet card open/closed ──────────────────────────────────────────
function toggleMeet(id) {
  const picker = document.getElementById(`picker-${id}`);
  const card   = document.getElementById(`card-${id}`);
  const isOpen = picker.classList.contains('open');

  // Close all others first
  document.querySelectorAll('.role-picker').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.meet-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.pin-step').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.role-grid').forEach(r => r.style.display = '');

  if (!isOpen) {
    picker.classList.add('open');
    card.classList.add('selected');
    selectedId = id;
    // Update hero logo
    const meet = meetsMap[id];
    document.getElementById('heroLogo').src = meet.logo_url || IRONCLAD_LOGO;
  } else {
    selectedId = null;
    document.getElementById('heroLogo').src = IRONCLAD_LOGO;
  }
}

// ── Role actions ──────────────────────────────────────────────────────────
function goLeaderboard(id) {
  saveMeetSession(id);
  window.location.href = 'results.html';
}

function showPin(id) {
  document.getElementById(`roles-${id}`).style.display = 'none';
  document.getElementById(`pin-${id}`).classList.add('open');
  setTimeout(() => document.getElementById(`pinInput-${id}`).focus(), 80);
}

function backToRoles(id) {
  document.getElementById(`pin-${id}`).classList.remove('open');
  document.getElementById(`roles-${id}`).style.display = '';
  document.getElementById(`pinErr-${id}`).textContent = '';
  document.getElementById(`pinInput-${id}`).value = '';
}

// ── PIN verify ────────────────────────────────────────────────────────────
async function submitPin(id) {
  const entered = document.getElementById(`pinInput-${id}`).value.trim();
  if (!entered) return;

  const errEl = document.getElementById(`pinErr-${id}`);

  const { data, error } = await sb.from('meets').select('pin').eq('id', id).single();
  if (error || !data) {
    errEl.textContent = '❌ Could not verify PIN.';
    return;
  }

  // Guard: PIN not set on this meet
  if (!data.pin) {
    errEl.textContent = '❌ No PIN has been set for this meet. Contact your meet director.';
    return;
  }

  if (entered === data.pin) {
    saveMeetSession(id);
    window.location.href = 'scoring.html';
  } else {
    errEl.textContent = '❌ Incorrect PIN. Try again.';
    document.getElementById(`pinInput-${id}`).value = '';
    document.getElementById(`pinInput-${id}`).focus();
  }
}

// ── Save session (key matches supabase.js FEP_SESSION_KEY) ────────────────
function saveMeetSession(id) {
  const m = meetsMap[id];
  sessionStorage.setItem(FEP_SESSION_KEY, JSON.stringify({
    id: m.id, name: m.name, date: m.date, logo_url: m.logo_url || null
  }));
}
</script>
</body>
</html>
