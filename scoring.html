<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <link rel="icon" type="image/png" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1b2a">
  <title>Field Events Pro — Scoring</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .topbar { background: #0d1b2a; border-bottom: 2px solid #1e3a5f; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    #topLogo { height: 38px; width: auto; }
    .meet-pill { background: #162438; border: 1px solid #1e3a5f; border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 700; color: #7eb8f7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-title { font-size: 18px; font-weight: 800; color: #7eb8f7; flex: 1; }
    .nav-home { color: white; text-decoration: none; font-size: 20px; }
    #offlineBanner { display: none; background: #dc3545; color: white; padding: 8px; text-align: center; font-weight: bold; flex-shrink: 0; }
    #offlineBanner.show { display: block; }
    .event-header { background: #0d1b2a; color: white; padding: 10px 14px; flex-shrink: 0; }
    .event-header select { width: 100%; padding: 10px; background: #162438; color: white; border-radius: 6px; font-size: 14px; }
    .container { display: flex; flex: 1; overflow: hidden; }
    .left-panel { width: 42%; border-right: 2px solid #ddd; overflow-y: auto; background: white; padding: 8px; }
    .right-panel { flex: 1; overflow-y: auto; padding: 15px; background: #fdfdfd; }
    .ath-btn { width: 100%; padding: 13px 14px; margin: 5px 0; background: #f8f9fa; border: 1px solid #ddd; text-align: left; cursor: pointer; border-radius: 6px; }
    .ath-btn:hover { background: #eef4ff; }
    .ath-btn.active { background: #e6f0ff; border-left: 5px solid #1a5a8c; }
    .add-btn { width: 100%; padding: 15px; background: #155724; color: #4dca7a; border: 1px solid #28a745; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 12px 0; }
    .height-controls, .vmark-grid { margin: 12px 0; }
    .vmark-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .vmark-btn { height: 60px; border-radius: 8px; font-size: 22px; font-weight: bold; color: white; cursor: pointer; }
    .btn-o { background: #28a745; } .btn-x { background: #dc3545; } .btn-p { background: #6c757d; }
  </style>
</head>
<body>

<div id="offlineBanner">⚠ NO CONNECTION — Attempts saved locally</div>

<div class="topbar">
  <img id="topLogo" src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" alt="Logo">
  <div class="meet-pill" id="topMeetName">Loading…</div>
  <div class="topbar-title">SCORING</div>
  <a href="index.html" class="nav-home">⌂</a>
</div>

<div class="event-header">
  <select id="eventSelect" onchange="loadEvent()">
    <option value="">— Select Event —</option>
  </select>
</div>

<div class="container">
  <div class="left-panel" id="leftPanel"></div>
  <div class="right-panel" id="rightPanel"></div>
</div>

<script>
const sb = supabase.createClient('https://qjomrnguhbqfluzwuntz.supabase.co', 'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_');

let currentMeet = null;
let currentAth = null;
let currentEventId = '';
let isVertical = false;
let hPhase = '3att';
let maxAttempts = 3;
let vPhase = 'Prelims';
let flightBarHeight = '';
let checkinStatus = {};
let attemptsCache = {};
let athleteListCache = [];

window.onload = async () => {
  const stored = sessionStorage.getItem('fep_meet');
  if (!stored) return window.location.href = 'index.html';
  currentMeet = JSON.parse(stored);

  document.getElementById('topLogo').src = currentMeet.logo_url || 'https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png';
  document.getElementById('topMeetName').textContent = currentMeet.name || 'Meet';

  await loadEvents();

  const banner = document.getElementById('offlineBanner');
  const toggle = () => banner.classList.toggle('show', !navigator.onLine);
  toggle();
  window.addEventListener('online', toggle);
  window.addEventListener('offline', toggle);
};

async function loadEvents() {
  const { data, error } = await sb.from('events').select('*').eq('meet_id', currentMeet.id).order('name');
  if (error) return console.error(error);

  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '<option value="">— Select Event —</option>';
  (data || []).forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = `${e.name} (${e.gender || ''} ${e.level || ''})`.trim();
    sel.appendChild(opt);
  });
}

async function loadEvent() {
  currentEventId = document.getElementById('eventSelect').value;
  if (!currentEventId) return;

  const nameLower = document.getElementById('eventSelect').selectedOptions[0].text.toLowerCase();
  isVertical = nameLower.includes('high jump') || nameLower.includes('pole vault');

  // Reset state
  currentAth = null;
  checkinStatus = {};
  attemptsCache[currentEventId] = attemptsCache[currentEventId] || [];

  // Load athletes + attempts
  const [{ data: assigns }, { data: attempts }] = await Promise.all([
    sb.from('event_assignments')
      .select('athlete_id, athletes!event_assignments_athlete_id_fkey(fname, lname, team)')
      .eq('event_id', currentEventId)
      .eq('meet_id', currentMeet.id),
    sb.from('attempts')
      .select('*')
      .eq('event_id', currentEventId)
      .eq('meet_id', currentMeet.id)
  ]);

  athleteListCache = (assigns || []).map(r => ({
    id: r.athlete_id,
    name: r.athletes ? `${r.athletes.fname} ${r.athletes.lname}`.trim() : 'Unknown',
    team: r.athletes?.team || ''
  }));

  attemptsCache[currentEventId] = attempts || [];

  renderAthleteList();
  renderRightPanel();
}

function renderAthleteList() {
  const left = document.getElementById('leftPanel');
  left.innerHTML = '';
  athleteListCache.forEach(ath => {
    const btn = document.createElement('button');
    btn.className = `ath-btn ${currentAth && currentAth.id === ath.id ? 'active' : ''}`;
    btn.innerHTML = `<strong>${ath.name}</strong>${ath.team ? `<br><small>${ath.team}</small>` : ''}`;
    btn.onclick = () => {
      currentAth = ath;
      renderAthleteList();
      renderRightPanel();
    };
    left.appendChild(btn);
  });
}

function renderRightPanel() {
  const right = document.getElementById('rightPanel');
  if (!currentAth) {
    right.innerHTML = '<div style="padding:60px;text-align:center;color:#888;">Select an athlete</div>';
    return;
  }

  const attempts = attemptsCache[currentEventId] || [];
  const athAttempts = attempts.filter(a => a.athlete_id === currentAth.id);

  right.innerHTML = `
    <div class="card">
      <h2>${currentAth.name}</h2>
      ${isVertical ? `
        <div class="height-controls">
          <input type="text" id="flightBarInput" value="${flightBarHeight}" placeholder="e.g. 6-00">
          <button onclick="incFlightBar(2)">+2"</button>
          <button onclick="incFlightBar(6)">+6"</button>
          <button onclick="incFlightBar(12)">+1'</button>
          <button onclick="setFlightBar()">SET</button>
        </div>
        <div class="vmark-grid">
          <button class="vmark-btn btn-o" onclick="submitV('O')">O</button>
          <button class="vmark-btn btn-x" onclick="submitV('X')">X</button>
          <button class="vmark-btn btn-p" onclick="submitV('P')">P</button>
        </div>
      ` : `
        <button class="add-btn" onclick="addHorizontalAttempt()">+ ADD ATTEMPT (${hPhase})</button>
      `}
      <div id="attemptList"></div>
    </div>
  `;

  renderAttempts(athAttempts);
}

function renderAttempts(attempts) {
  const el = document.getElementById('attemptList');
  if (!el) return;
  el.innerHTML = attempts.length ? attempts.map(a => `
    <div class="attempt-row">
      <span class="att-num">ATT ${a.attempt_number}</span>
      <span class="att-mark">${a.mark}</span>
      <span class="att-badge ${a.result === 'make' ? 'att-make' : 'att-foul'}">${a.result.toUpperCase()}</span>
    </div>
  `).join('') : '<p style="text-align:center;color:#aaa;">No attempts yet</p>';
}

async function addHorizontalAttempt() {
  if (!currentAth || !currentEventId) return;
  const mark = prompt('Enter mark (e.g. 42-06, FOUL, PASS):');
  if (!mark) return;

  const result = mark.toUpperCase().includes('FOUL') ? 'foul' : 'make';
  const nextNum = (attemptsCache[currentEventId].filter(a => a.athlete_id === currentAth.id).length || 0) + 1;

  await sb.from('attempts').insert({
    meet_id: currentMeet.id,
    event_id: currentEventId,
    athlete_id: currentAth.id,
    attempt_number: nextNum,
    mark: mark.trim(),
    result
  });

  // Refresh
  const { data } = await sb.from('attempts').select('*').eq('event_id', currentEventId).eq('meet_id', currentMeet.id);
  attemptsCache[currentEventId] = data || [];
  renderRightPanel();
}

async function submitV(result) {
  if (!currentAth || !currentEventId) return;
  const mark = result; // O, X, or P
  const nextNum = (attemptsCache[currentEventId].filter(a => a.athlete_id === currentAth.id).length || 0) + 1;

  await sb.from('attempts').insert({
    meet_id: currentMeet.id,
    event_id: currentEventId,
    athlete_id: currentAth.id,
    attempt_number: nextNum,
    mark,
    result: result === 'O' ? 'make' : 'foul'
  });

  const { data } = await sb.from('attempts').select('*').eq('event_id', currentEventId).eq('meet_id', currentMeet.id);
  attemptsCache[currentEventId] = data || [];
  renderRightPanel();
}

function incFlightBar(inches) {
  // Simple stub - expand with your original parse logic if needed
  alert('Flight bar increment: +' + inches + '" (full logic can be added from your original code)');
}

function setFlightBar() {
  flightBarHeight = document.getElementById('flightBarInput').value || '';
  alert('Bar set to: ' + flightBarHeight);
}
</script>
</body>
</html>
