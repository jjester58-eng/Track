<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <link rel="icon" type="image/png" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Field Events Pro">
  <meta name="theme-color" content="#0d1b2a">
  <title>Field Events Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0a0f1a;
      color: #e0e6f0;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .company-logo {
      height: 90px;
      width: auto;
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    h1 {
      color: #7eb8f7;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 1.5px;
      margin: 0 0 8px 0;
    }

    .subtitle {
      color: #4a6a8a;
      font-size: 15px;
      margin-bottom: 60px;
      font-weight: 400;
    }

    .btn-group {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 26px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-size: 18px;
      font-weight: 700;
      border: 1px solid transparent;
      transition: all 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .btn-icon {
      font-size: 28px;
      flex-shrink: 0;
      width: 44px;
      text-align: center;
    }

    .btn-text { flex: 1; }
    .btn-title { display: block; font-size: 18px; }
    .btn-sub   { display: block; font-size: 13px; font-weight: 400; opacity: 0.75; margin-top: 3px; }

    .btn-scoring  { background: #0d2a4a; border-color: #1e5a8c; }
    .btn-scoring:hover  { background: #113455; }

    .btn-results { background: #0a2a18; border-color: #1a5a30; }
    .btn-results:hover { background: #0d3a22; }

    .btn-admin   { background: #2a0d0d; border-color: #5a1a1a; }
    .btn-admin:hover   { background: #3a1212; }

    .footer {
      margin-top: 80px;
      color: #445566;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- Company Logo -->
  <img src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" 
       alt="Ironclad Logo" 
       class="company-logo">

  <h1>FIELD EVENTS PRO</h1>
  <p class="subtitle">Texas High School Track &amp; Field</p>

  <div class="btn-group">

    <a href="scoring.html" class="btn btn-scoring">
      <span class="btn-icon">🏃</span>
      <span class="btn-text">
        <span class="btn-title">Coach Scoring</span>
        <span class="btn-sub">Record attempts • Manage roster</span>
      </span>
      <span class="btn-arrow">›</span>
    </a>

    <a href="results.html" class="btn btn-results">
      <span class="btn-icon">📊</span>
      <span class="btn-text">
        <span class="btn-title">Live Leaderboard</span>
        <span class="btn-sub">Pressbox view • Real-time results</span>
      </span>
      <span class="btn-arrow">›</span>
    </a>

    <a href="admin.html" class="btn btn-admin">
      <span class="btn-icon">🔐</span>
      <span class="btn-text">
        <span class="btn-title">Admin / Import Roster</span>
        <span class="btn-sub">CSV Import • Reset meet • Upload images</span>
      </span>
      <span class="btn-arrow">›</span>
    </a>

  </div>

  <div class="footer">
    Field Events Pro • Powered by Supabase
  </div>

</body>
</html>
