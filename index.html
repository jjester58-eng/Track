<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <link rel="icon" type="image/png" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07101c">
  <title>Field Events Pro — Powered by Ironclad</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Your CSS styles here */
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <img src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" height="30" alt="">
    <div class="topbar-brand">Field Events Pro</div>
    <a href="admin.html" class="topbar-admin">🔐 Admin</a>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-glow"></div>
    <img id="heroLogo"
         src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png"
         alt="Field Events Pro" class="hero-logo">
    <div class="hero-badge">Track &amp; Field · Live Scoring</div>
    <h1>Field<br><em>Events</em><br>Pro</h1>
    <p class="hero-sub">Real-time scoring and live leaderboards for every field event.</p>
    <div class="hero-divider"></div>
  </section>

  <!-- MEET LIST -->
  <div class="section-label">Select Your Meet</div>
  <div class="meet-list" id="meetList">
    <div class="loading-msg">Loading meets…</div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <img src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" alt="">
    &copy; 2025 Ironclad · Field Events Pro
  </footer>

  <!-- ══ MODAL ══ -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <div class="modal-drag"></div>

      <img id="modalLogo"
           src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png"
           alt="Meet Logo" class="modal-logo">
      <h2 id="modalName"></h2>
      <p class="modal-date" id="modalDate"></p>

      <!-- Step 1: choose role -->
      <div id="roleStep">
        <div class="role-grid">
          <button class="role-btn role-results" onclick="goLeaderboard()">
            <span class="icon">📊</span>
            Leaderboard
            <span class="role-sub">No login</span>
          </button>
          <button class="role-btn role-scoring" onclick="showPinStep()">
            <span class="icon">📋</span>
            Scoring
            <span class="role-sub">PIN required</span>
          </button>
        </div>
        <button class="modal-back" onclick="closeModal()">← Back to meets</button>
      </div>

      <!-- Step 2: PIN entry -->
      <div id="pinStep" style="display:none;">
        <p>Enter the scoring PIN provided by your meet director.</p>
        <input type="tel" id="pinInput" class="pin-input"
               maxlength="6" inputmode="numeric" pattern="[0-9]*"
               placeholder="· · · ·"
               onkeydown="if(event.key==='Enter') submitPin()">
        <button class="pin-btn" onclick="submitPin()">Enter Scoring</button>
        <div class="pin-error" id="pinError"></div>
        <button class="modal-back" onclick="showRoleStep()">← Back</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = process.env.NEXT_PUBLIC_SUPABASE_URL;
    const SUPABASE_KEY = process.env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY;

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const IRONCLAD = 'https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png';
    let selectedMeet = null;

    // ── Load active meets ─────────────────────────────────────────
    const meetsMap = {}; // id → meet object

    window.onload = async () => {
      const list = document.getElementById('meetList');

      try {
        const { data: meets, error } = await sb
          .from('meets')
          .select('id, name, date, logo_url')
          .eq('is_active', true)
          .order('date', { ascending: true });

        if (error) {
          console.error('Error loading meets:', error);
          list.innerHTML = `<div class="empty-msg">Error loading meets: ${error.message}</div>`;
          return;
        }

        if (!meets || !meets.length) {
          list.innerHTML = `<div class="empty-msg">
            No active meets right now.<br>
            <span style="font-size:12px;margin-top:6px;display:block;color:var(--text3);">
              A meet director needs to create and activate one first.
            </span>
          </div>`;
          return;
        }

        // Store in map so onclick just passes the ID — no JSON-in-HTML
        meets.forEach(m => meetsMap[m.id] = m);

        list.innerHTML = meets.map(m => {
          const logo = m.logo_url
            ? `<img src="${m.logo_url}" class="meet-logo" alt="">`
            : `<div class="meet-logo-placeholder">🏟</div>`;
          const dateStr = m.date
            ? new Date(m.date + 'T12:00:00').toLocaleDateString('en-US',
                { weekday:'short', month:'short', day:'numeric', year:'numeric' })
            : 'Date TBD';
          return `<div class="meet-card" onclick="openMeet('${m.id}')">
            ${logo}
            <div class="meet-info">
              <div class="meet-name">${m.name}</div>
              <div class="meet-date">${dateStr}</div>
            </div>
            <div class="meet-arrow">›</div>
          </div>`;
        }).join('');

      } catch(err) {
        console.error('Error loading meets:', err);
        list.innerHTML = `<div class="empty-msg">Error loading meets: ${err.message}</div>`;
      }
    };

    // ── Open modal ────────────────────────────────────────────────
    function openMeet(id) {
      selectedMeet = meetsMap[id];
      if (!selectedMeet) return;
      const meet = selectedMeet;
      document.getElementById('heroLogo').src  = meet.logo_url || IRONCLAD;
      document.getElementById('modalLogo').src = meet.logo_url || IRONCLAD;
      document.getElementById('modalName').textContent = meet.name;
      document.getElementById('modalDate').textContent = meet.date
        ? new Date(meet.date + 'T12:00:00').toLocaleDateString('en-US',
            { weekday:'long', month:'long', day:'numeric', year:'numeric' })
        : '';
      showRoleStep();
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.getElementById('heroLogo').src = IRONCLAD;
      selectedMeet = null;
    }

    // ── Role steps ────────────────────────────────────────────────
    function showRoleStep() {
      document.getElementById('roleStep').style.display = 'block';
      document.getElementById('pinStep').style.display  = 'none';
      document.getElementById('pinError').textContent   = '';
      document.getElementById('pinInput').value         = '';
    }

    function showPinStep() {
      document.getElementById('roleStep').style.display = 'none';
      document.getElementById('pinStep').style.display  = 'block';
      setTimeout(() => document.getElementById('pinInput').focus(), 80);
    }

    // ── Leaderboard — no PIN ──────────────────────────────────────
    function goLeaderboard() {
      saveMeetSession();
      window.location.href = 'results.html';
    }

    // ── Scoring — verify PIN ──────────────────────────────────────
    async function submitPin() {
      const entered = document.getElementById('pinInput').value.trim();
      if (!entered) return;

      const { data, error } = await sb
        .from('meets').select('pin').eq('id', selectedMeet.id).single();

      if (error || !data) {
        document.getElementById('pinError').textContent = '❌ Could not verify PIN.';
        return;
      }

      if (entered === data.pin) {
        saveMeetSession();
        window.location.href = 'scoring.html';
      } else {
        document.getElementById('pinError').textContent = '❌ Incorrect PIN. Try again.';
        document.getElementById('pinInput').value = '';
        document.getElementById('pinInput').focus();
      }
    }

    // ── Save meet to sessionStorage ───────────────────────────────
    function saveMeetSession() {
      sessionStorage.setItem('fep_meet', JSON.stringify({
        id:       selectedMeet.id,
        name:     selectedMeet.name,
        date:     selectedMeet.date,
        logo_url: selectedMeet.logo_url || null
      }));
    }

    // Close modal on backdrop tap
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
