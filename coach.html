// ====================== AUTH & INIT ======================
async function initApp() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    alert("Please log in first (add a simple login screen if needed)");
    return;
  }
  updateBanners();
  loadEvents();
}

async function loadEvents() {
  const { data, error } = await supabase
    .from('events')
    .select('*')
    .order('name');

  if (error) {
    console.error(error);
    alert('Error loading events');
    return;
  }

  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '<option value="">-- Select Event --</option>';
  data.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = `${e.name} (${e.gender} ${e.level || ''})`;
    sel.appendChild(opt);
  });
}

// ====================== LOAD EVENT ======================
async function loadEvent() {
  currentEventId = document.getElementById('eventSelect').value;
  if (!currentEventId) return;

  currentEventName = document.getElementById('eventSelect').selectedOptions[0].text.toLowerCase();
  isVertical = currentEventName.includes('high jump') || currentEventName.includes('pole vault');

  // Toggle UI elements
  document.getElementById('hPhaseButtons').classList.toggle('hidden', isVertical);
  document.getElementById('vPhaseButtons').classList.toggle('hidden', !isVertical);
  document.getElementById('flightBarStrip').classList.toggle('show', isVertical);

  flightBarHeight = '';
  checkinStatus = {};
  document.getElementById('flightBarInput').value = '';
  document.getElementById('flightBarDisplay').textContent = '';

  if (!attemptsCache[currentEventId]) attemptsCache[currentEventId] = [];

  // Load athletes
  const { data: athletes } = await supabase
    .from('event_athletes')           // ← Change table name if yours is different
    .select('*, athletes(*)')
    .eq('event_id', currentEventId);

  athleteListCache = athletes || [];
  renderAthleteList(athleteListCache);

  // Load attempts
  const { data: attempts } = await supabase
    .from('attempts')
    .select('*')
    .eq('event_id', currentEventId);

  attemptsCache[currentEventId] = attempts || [];
  renderAthleteList(athleteListCache);
}

// ====================== SAVE ATTEMPT (Supabase) ======================
async function saveAttemptToSupabase(data) {
  const { error } = await supabase
    .from('attempts')
    .insert([{
      event_id: data.event_id,
      athlete_id: data.athlete_id,
      mark: data.mark,
      height: data.bar_height || null,
      phase: data.phase,
      is_foul: data.is_foul || false,
      is_pass: data.is_pass || false
    }]);

  if (error) {
    console.error(error);
    enqueue(data);        // save to offline queue if fails
  }
}

  };

  attemptsCache[currentEventId].push({ ...data, id: 'temp_'+Date.now(), _queued: true });
  renderHEntry();
  renderAthleteList(athleteListCache);

  saveAttemptToSupabase(data);
}
