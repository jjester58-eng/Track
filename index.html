<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Field Events Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Supabase CDN -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { margin-top: 0; }
    select, button { padding: 10px; font-size: 16px; }
    .card { background: white; padding: 15px; border-radius: 8px; margin-top: 20px; }
  </style>
</head>

<body>

<h1>Field Events Pro</h1>

<div class="card">
  <h3>Select Event</h3>
  <select id="eventSelect"></select>
</div>

<div class="card">
  <h3>Athletes</h3>
  <ul id="athleteList"></ul>
</div>

<div class="card">
  <h3>Attempts</h3>
  <ul id="attemptList"></ul>
</div>

<script>
// ====================== SUPABASE SETUP ======================
const supabaseUrl = 'https://qjomrnguhbqfluzwuntz.supabase.co';
const supabaseAnonKey = 'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_';

// ✅ Correct initializer
const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

// ====================== HELPERS ======================
function safeHeightString(val) {
  if (!val && val !== 0) return '';
  if (typeof val === 'string' && val.includes('-')) return val.trim();
  return String(val).trim();
}

// ====================== SUPABASE FUNCTIONS ======================
async function getEvents() {
  const { data, error } = await supabase
    .from('events')
    .select('*')
    .order('name');

  if (error) { console.error(error); return []; }
  return data;
}

async function getAthletesByEvent(eventId) {
  const { data, error } = await supabase
    .from('event_assignments')
    .select(`
      athletes (
        id, fname, lname, team
      )
    `)
    .eq('event_id', eventId);

  if (error) { console.error(error); return []; }

  return data.map(r => ({
    id: r.athletes.id,
    name: `${r.athletes.fname} ${r.athletes.lname}`,
    team: r.athletes.team || ''
  }));
}

async function getAllAttemptsForEvent(eventId) {
  const { data, error } = await supabase
    .from('attempts')
    .select('*')
    .eq('event_id', eventId)
    // ✅ Correct column name
    .order('ts', { ascending: true });

  if (error) { console.error(error); return []; }

  return data.map(r => ({
    id: r.id,
    athlete_name: r.athlete_name,
    mark: r.mark,
    foul: r.foul,
    pass: r.pass,
    height: safeHeightString(r.height)
  }));
}

// ====================== UI LOGIC ======================
async function loadEvents() {
  const events = await getEvents();
  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '';

  events.forEach(ev => {
    const opt = document.createElement('option');
    opt.value = ev.id;
    opt.textContent = `${ev.name} (${ev.gender} ${ev.level})`;
    sel.appendChild(opt);
  });

  if (events.length) {
    sel.value = events[0].id;
    loadEventData(events[0].id);
  }
}

async function loadEventData(eventId) {
  const athletes = await getAthletesByEvent(eventId);
  const attempts = await getAllAttemptsForEvent(eventId);

  const athList = document.getElementById('athleteList');
  athList.innerHTML = '';
  athletes.forEach(a => {
    const li = document.createElement('li');
    li.textContent = `${a.name} — ${a.team}`;
    athList.appendChild(li);
  });

  const attList = document.getElementById('attemptList');
  attList.innerHTML = '';
  attempts.forEach(at => {
    const li = document.createElement('li');
    li.textContent = `${at.athlete_name}: ${at.mark || ''} ${at.foul ? 'FOUL' : ''} ${at.pass ? 'PASS' : ''}`;
    attList.appendChild(li);
  });
}

document.getElementById('eventSelect').addEventListener('change', e => {
  loadEventData(e.target.value);
});

// ====================== INITIAL LOAD ======================
loadEvents();
</script>

</body>
</html>
