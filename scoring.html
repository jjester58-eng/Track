<script type="module">
import { sb, initPage, MEET, log } from './meet-session.js';

let currentMeet = null;

/* -----------------------------
   BOOT
------------------------------*/
window.addEventListener('DOMContentLoaded', async () => {
  log("SCORING PAGE BOOT");

  currentMeet = await initPage();
  if (!currentMeet) return;

  document.getElementById('topMeetName').textContent =
    currentMeet.name;

  await loadEvents();
});

/* -----------------------------
   LOAD EVENTS
------------------------------*/
async function loadEvents() {
  log("Loading events...");

  const { data, error } = await sb
    .from('events')
    .select('id, name, gender, level')
    .eq('meet_id', currentMeet.id)
    .order('name');

  if (error) return log(error.message);

  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '<option value="">— Select Event —</option>';

  (data || []).forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent =
      `${e.name}` +
      (e.gender ? ` — ${e.gender}` : '') +
      (e.level ? ` (${e.level})` : '');

    sel.appendChild(opt);
  });
}

/* -----------------------------
   LOAD EVENT ATHLETES (SAFE 2 STEP)
------------------------------*/
window.loadEvent = async function () {
  const eventId = document.getElementById('eventSelect').value;
  if (!eventId) return;

  log("Loading event athletes...");

  const { data: assigns, error } = await sb
    .from('event_assignments')
    .select('athlete_id, athlete_name')
    .eq('event_id', eventId)
    .eq('meet_id', currentMeet.id);

  if (error) return log(error.message);

  const ids = assigns.map(a => a.athlete_id);

  const { data: athletes } = await sb
    .from('athletes')
    .select('id, fname, lname, team')
    .in('id', ids);

  const map = {};
  (athletes || []).forEach(a => (map[a.id] = a));

  const left = document.getElementById('leftPanel');
  left.innerHTML = '';

  assigns.forEach(a => {
    const ath = map[a.athlete_id] || {};
    const name = ath.fname
      ? `${ath.fname} ${ath.lname}`
      : a.athlete_name;

    const btn = document.createElement('button');
    btn.className = 'ath-btn';

    btn.onclick = (e) =>
      selectAthlete(a.athlete_id, name, eventId, e);

    btn.innerHTML = `
      <div style="font-weight:700;">${name}</div>
      ${ath.team ? `<div style="font-size:13px;color:#666;">${ath.team}</div>` : ''}
    `;

    left.appendChild(btn);
  });
};

/* -----------------------------
   SELECT ATHLETE
------------------------------*/
async function selectAthlete(id, name, eventId, e) {
  document.querySelectorAll('.ath-btn')
    .forEach(b => b.classList.remove('active'));

  if (e?.currentTarget) e.currentTarget.classList.add('active');

  const { data } = await sb
    .from('attempts')
    .select('*')
    .eq('athlete_id', id)
    .eq('event_id', eventId)
    .eq('meet_id', currentMeet.id)
    .order('attempt_number');

  document.getElementById('rightPanel').innerHTML = `
    <div>
      <h2>${name}</h2>
      <button onclick="addAttempt('${id}','${eventId}')"
        style="width:100%;padding:14px;background:#155724;color:white;border:none;border-radius:8px;">
        + Add Attempt
      </button>
      <div id="attemptList"></div>
    </div>
  `;

  renderAttempts(data || []);
}

/* -----------------------------
   RENDER
------------------------------*/
function renderAttempts(attempts) {
  const el = document.getElementById('attemptList');
  el.innerHTML = attempts.length
    ? attempts.map(a =>
        `<div style="padding:8px;border-bottom:1px solid #eee;">
          Attempt ${a.attempt_number} — <b>${a.mark}</b>
        </div>`
      ).join('')
    : `<div>No attempts yet</div>`;
}

/* -----------------------------
   ADD ATTEMPT
------------------------------*/
window.addAttempt = async function (athleteId, eventId) {
  const mark = prompt('Enter mark');
  if (!mark) return;

  const { data } = await sb
    .from('attempts')
    .select('attempt_number')
    .eq('athlete_id', athleteId)
    .eq('event_id', eventId)
    .eq('meet_id', currentMeet.id);

  const next = (data?.length || 0) + 1;

  await sb.from('attempts').insert({
    meet_id: currentMeet.id,
    event_id: eventId,
    athlete_id: athleteId,
    attempt_number: next,
    mark,
    result: mark.toUpperCase().includes('FOUL') ? 'foul' : 'make'
  });

  selectAthlete(athleteId, 'Updated', eventId, null);
};
</script>
