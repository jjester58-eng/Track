<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <link rel="icon" type="image/png" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1b2a">
  <title>Field Events Pro — Scoring</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Topbar ── */
    .topbar { background: #0d1b2a; border-bottom: 2px solid #1e3a5f; padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #topLogo { height: 36px; width: auto; }
    .meet-pill { background: #162438; border: 1px solid #1e3a5f; border-radius: 20px; padding: 3px 11px; font-size: 12px; font-weight: 700; color: #7eb8f7; white-space: nowrap; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
    .topbar-title { font-size: 17px; font-weight: 800; color: #7eb8f7; flex: 1; }
    .nav-home { color: white; text-decoration: none; font-size: 20px; }

    #offlineBanner { display: none; background: #dc3545; color: white; padding: 7px; text-align: center; font-weight: bold; font-size: 13px; flex-shrink: 0; }
    #offlineBanner.show { display: block; }

    /* ── Event selector + phase strip ── */
    .event-header { background: #0d1b2a; padding: 10px 14px; flex-shrink: 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .event-header select { flex: 1; min-width: 160px; padding: 9px 10px; background: #162438; color: white; border: 1px solid #2a4a6e; border-radius: 6px; font-size: 14px; }

    /* Phase tabs (horizontal events) */
    .phase-tabs { display: flex; gap: 6px; flex-shrink: 0; }
    .phase-tab { padding: 7px 13px; background: #1e3a5f; color: #7eb8f7; border: 1px solid #2a5a8c; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .phase-tab.active { background: #7eb8f7; color: #0d1b2a; }
    #phaseTabs { display: none; }

    /* ── Split layout ── */
    .container { display: flex; flex: 1; overflow: hidden; }
    .left-panel { width: 40%; border-right: 2px solid #ddd; overflow-y: auto; background: white; }
    .right-panel { flex: 1; overflow-y: auto; padding: 14px; background: #fdfdfd; }

    /* ── Athlete list ── */
    .ath-btn { width: 100%; padding: 12px 14px; background: white; border: none; border-bottom: 1px solid #eee; text-align: left; cursor: pointer; }
    .ath-btn:hover  { background: #f0f4ff; }
    .ath-btn.active { background: #e6f0ff; border-left: 5px solid #1a5a8c; }
    .ath-name  { font-weight: 700; font-size: 14px; color: #1a2a3a; }
    .ath-team  { font-size: 12px; color: #888; margin-top: 2px; }
    .ath-best  { font-size: 13px; font-weight: 700; color: #1a5a8c; margin-top: 2px; }

    /* ── Right panel card ── */
    .rcard { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .rcard h2 { margin: 0 0 2px; font-size: 20px; color: #1a2a3a; }
    .rcard .sub { font-size: 13px; color: #888; margin-bottom: 14px; }

    /* ── Attempt limit notice ── */
    .limit-banner { background: #1a2a3a; color: #7eb8f7; font-size: 13px; font-weight: 700; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; text-align: center; }
    .limit-done   { background: #0a2a18; color: #4dca7a; }
    .limit-warn   { background: #2a1a00; color: #f0a030; }

    /* ── Horizontal attempt button ── */
    .add-btn { width: 100%; padding: 16px; background: #0d2a18; color: #4dca7a; border: 2px solid #28a745; border-radius: 10px; font-size: 17px; font-weight: 800; cursor: pointer; margin-bottom: 14px; letter-spacing: 0.5px; }
    .add-btn:hover { background: #163a22; }
    .add-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Attempt rows ── */
    .att-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 7px; }
    .att-num  { font-size: 11px; font-weight: 700; color: #888; min-width: 44px; }
    .att-height { font-size: 12px; color: #4a7aaa; font-weight: 600; min-width: 48px; }
    .att-mark { flex: 1; font-size: 17px; font-weight: 800; color: #1a2a3a; }
    .att-badge { font-size: 11px; padding: 3px 9px; border-radius: 4px; font-weight: bold; }
    .badge-make  { background: #0a2a18; color: #4dca7a; }
    .badge-foul  { background: #2a0a0a; color: #f87; }
    .badge-pass  { background: #1a2030; color: #7eb8f7; }
    .badge-nh    { background: #2a2a2a; color: #aaa; }

    /* ── Vertical / high jump controls ── */
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .bar-input { width: 100px; padding: 10px; font-size: 20px; font-weight: 700; text-align: center; background: #f0f4ff; border: 2px solid #1e5a8c; border-radius: 8px; color: #1a2a3a; }
    .bar-inc { padding: 9px 13px; background: #0d2a4a; color: #7eb8f7; border: 1px solid #1e5a8c; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .bar-inc:hover { background: #1a3a5c; }
    .bar-set { padding: 9px 14px; background: #155724; color: #4dca7a; border: 1px solid #28a745; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .bar-label { font-size: 12px; color: #888; }
    .current-bar { font-size: 22px; font-weight: 900; color: #1a5a8c; }

    /* O / X / P buttons */
    .vmark-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 12px 0 4px; }
    .vmark-btn { height: 72px; border-radius: 10px; font-size: 28px; font-weight: 900; color: white; border: none; cursor: pointer; transition: opacity 0.15s; }
    .vmark-btn:hover   { opacity: 0.85; }
    .vmark-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .btn-o { background: #28a745; }
    .btn-x { background: #dc3545; }
    .btn-p { background: #495057; }
    .vmark-label { text-align: center; font-size: 12px; color: #888; margin-top: 4px; }

    /* Eliminated banner */
    .elim-banner { background: #2a0a0a; color: #f87; font-size: 14px; font-weight: 700; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 10px; border: 1px solid #dc3545; }
  </style>
</head>
<body>

<div id="offlineBanner">⚠ NO CONNECTION — Attempts saved locally</div>

<div class="topbar">
  <img id="topLogo" src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" alt="Logo">
  <div class="meet-pill" id="topMeetName">Loading…</div>
  <div class="topbar-title">SCORING</div>
  <a href="index.html" class="nav-home">⌂</a>
</div>

<div class="event-header">
  <select id="eventSelect" onchange="loadEvent()">
    <option value="">— Select Event —</option>
  </select>
  <!-- Phase tabs shown only for horizontal events -->
  <div class="phase-tabs" id="phaseTabs">
    <button class="phase-tab active" id="tab3" onclick="setPhase('3att')">3 Attempts</button>
    <button class="phase-tab"        id="tab4" onclick="setPhase('4att')">4 Attempts</button>
    <button class="phase-tab"        id="tabF" onclick="setPhase('finals')">Finals</button>
  </div>
</div>

<div class="container">
  <div class="left-panel"  id="leftPanel"><div style="padding:40px;text-align:center;color:#aaa;font-size:14px;">Select an event above</div></div>
  <div class="right-panel" id="rightPanel"><div style="padding:40px;text-align:center;color:#aaa;font-size:14px;">Select an athlete</div></div>
</div>

<script>
const sb = supabase.createClient(
  'https://qjomrnguhbqfluzwuntz.supabase.co',
  'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_'
);

const IRONCLAD = 'https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png';

let currentMeet     = null;
let currentEventId  = '';
let isVertical      = false;
let hPhase          = '3att';     // '3att' | '4att' | 'finals'
let currentAth      = null;       // { id, name, team }
let athleteList     = [];
let allAttempts     = [];         // all attempts for current event, refreshed on every save
let flightBar       = '';         // current bar height string for vertical events

// ── Phase attempt limits ──────────────────────────────────────
const PHASE_LIMIT = { '3att': 3, '4att': 4, 'finals': 3 };

// ── Init ──────────────────────────────────────────────────────
window.onload = async () => {
  const stored = sessionStorage.getItem('fep_meet');
  if (!stored) { window.location.href = 'index.html'; return; }
  currentMeet = JSON.parse(stored);
  document.getElementById('topLogo').src     = currentMeet.logo_url || IRONCLAD;
  document.getElementById('topMeetName').textContent = currentMeet.name || 'Meet';

  await loadEvents();

  const banner = document.getElementById('offlineBanner');
  const chk = () => banner.classList.toggle('show', !navigator.onLine);
  chk(); window.addEventListener('online', chk); window.addEventListener('offline', chk);
};

// ── Load events ───────────────────────────────────────────────
async function loadEvents() {
  const { data, error } = await sb.from('events').select('*').eq('meet_id', currentMeet.id).order('name');
  if (error) { console.error(error); return; }
  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '<option value="">— Select Event —</option>';
  (data || []).forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = `${e.name}${e.gender ? ' — ' + e.gender : ''}${e.level ? ' (' + e.level + ')' : ''}`;
    sel.appendChild(opt);
  });
}

// ── Load event ────────────────────────────────────────────────
async function loadEvent() {
  currentEventId = document.getElementById('eventSelect').value;
  currentAth     = null;
  allAttempts    = [];
  if (!currentEventId) return;

  const evName = document.getElementById('eventSelect').selectedOptions[0].text.toLowerCase();
  isVertical = evName.includes('high jump') || evName.includes('pole vault');

  // Show/hide phase tabs
  document.getElementById('phaseTabs').style.display = isVertical ? 'none' : 'flex';

  // Fetch athletes + all attempts in parallel
  const [{ data: assigns }, { data: attempts }] = await Promise.all([
    sb.from('event_assignments')
      .select('athlete_id, athletes!event_assignments_athlete_id_fkey(fname, lname, team)')
      .eq('event_id', currentEventId)
      .eq('meet_id',  currentMeet.id),
    sb.from('attempts').select('*')
      .eq('event_id', currentEventId)
      .eq('meet_id',  currentMeet.id)
      .order('attempt_number')
  ]);

  athleteList = (assigns || []).map(r => ({
    id:   r.athlete_id,
    name: r.athletes ? `${r.athletes.fname} ${r.athletes.lname}`.trim() : 'Unknown',
    team: r.athletes?.team || ''
  }));
  allAttempts = attempts || [];

  renderAthleteList();
  renderRight();
}

// ── Phase control (horizontal) ────────────────────────────────
function setPhase(phase) {
  hPhase = phase;
  ['3att','4att','finals'].forEach(p => {
    const el = document.getElementById(p === '3att' ? 'tab3' : p === '4att' ? 'tab4' : 'tabF');
    if (el) el.classList.toggle('active', p === phase);
  });
  renderRight();
}

// ── Athlete list (left panel) ─────────────────────────────────
function renderAthleteList() {
  const left = document.getElementById('leftPanel');
  if (!athleteList.length) {
    left.innerHTML = '<div style="padding:30px;text-align:center;color:#aaa;">No athletes in this event.</div>';
    return;
  }
  left.innerHTML = '';
  athleteList.forEach(ath => {
    const myAttempts = allAttempts.filter(a => a.athlete_id === ath.id);
    const best = getBestMark(myAttempts);
    const btn  = document.createElement('button');
    btn.className = 'ath-btn' + (currentAth && currentAth.id === ath.id ? ' active' : '');
    btn.innerHTML = `
      <div class="ath-name">${ath.name}</div>
      ${ath.team ? `<div class="ath-team">${ath.team}</div>` : ''}
      ${best    ? `<div class="ath-best">${best}</div>` : ''}`;
    btn.onclick = () => { currentAth = ath; renderAthleteList(); renderRight(); };
    left.appendChild(btn);
  });
}

// ── Right panel ───────────────────────────────────────────────
function renderRight() {
  const right = document.getElementById('rightPanel');
  if (!currentAth) {
    right.innerHTML = '<div style="padding:40px;text-align:center;color:#aaa;">Select an athlete</div>';
    return;
  }
  isVertical ? renderVertical(right) : renderHorizontal(right);
}

// ════════════════════════════════════════════════════════════
//  HORIZONTAL (shot, discus, long jump, triple jump)
// ════════════════════════════════════════════════════════════
function renderHorizontal(right) {
  const attempts  = allAttempts.filter(a => a.athlete_id === currentAth.id);
  const limit     = PHASE_LIMIT[hPhase];
  const used      = attempts.length;
  const remaining = limit - used;
  const done      = remaining <= 0;
  const best      = getBestMark(attempts);

  let limitHtml = '';
  if (done) {
    limitHtml = `<div class="limit-banner limit-done">✅ All ${limit} attempts recorded${best ? ' — Best: ' + best : ''}</div>`;
  } else {
    const cls = remaining === 1 ? 'limit-warn' : '';
    limitHtml = `<div class="limit-banner ${cls}">${remaining} attempt${remaining!==1?'s':''} remaining (${hPhase === '3att' ? '3-attempt' : hPhase === '4att' ? '4-attempt' : 'finals'} phase)</div>`;
  }

  right.innerHTML = `
    <div class="rcard">
      <h2>${currentAth.name}</h2>
      <div class="sub">${currentAth.team || ''}</div>
      ${limitHtml}
      <button class="add-btn" id="addHBtn" onclick="addHAttempt()" ${done ? 'disabled' : ''}>
        ${done ? '— NO MORE ATTEMPTS —' : '+ ADD ATTEMPT'}
      </button>
      <div id="attemptList"></div>
    </div>`;

  renderAttemptRows(attempts);
}

async function addHAttempt() {
  if (!currentAth || !currentEventId) return;
  const attempts = allAttempts.filter(a => a.athlete_id === currentAth.id);
  const limit    = PHASE_LIMIT[hPhase];
  if (attempts.length >= limit) return;

  const raw = prompt('Enter mark:\n\n  Distance: 42-06  or  13.72\n  Foul:     FOUL\n  Pass:     PASS');
  if (raw === null || raw.trim() === '') return;

  const mark   = raw.trim();
  const upper  = mark.toUpperCase();
  const result = upper === 'FOUL' ? 'foul'
               : upper === 'PASS' ? 'pass'
               : 'make';

  await sb.from('attempts').insert({
    meet_id: currentMeet.id, event_id: currentEventId,
    athlete_id: currentAth.id,
    attempt_number: attempts.length + 1,
    mark, result
  });

  await refreshAttempts();
}

// ════════════════════════════════════════════════════════════
//  VERTICAL (high jump, pole vault)
// ════════════════════════════════════════════════════════════
function renderVertical(right) {
  const attempts   = allAttempts.filter(a => a.athlete_id === currentAth.id);
  const eliminated = isEliminated(attempts);
  const cleared    = getClearedHeights(attempts);

  right.innerHTML = `
    <div class="rcard">
      <h2>${currentAth.name}</h2>
      <div class="sub">${currentAth.team || ''}</div>

      ${eliminated ? `<div class="elim-banner">❌ Eliminated — 3 consecutive misses</div>` : ''}

      <div class="bar-label">Current bar height</div>
      <div class="bar-row">
        <input class="bar-input" id="barInput" value="${flightBar}" placeholder="12-00" oninput="flightBar=this.value">
        <button class="bar-inc" onclick="incBar(2)">+2"</button>
        <button class="bar-inc" onclick="incBar(6)">+6"</button>
        <button class="bar-inc" onclick="incBar(12)">+1'</button>
        <button class="bar-set" onclick="setBar()">SET</button>
      </div>
      ${flightBar ? `<div class="current-bar" style="margin-bottom:12px;">${flightBar}</div>` : ''}

      ${cleared.length ? `<div style="font-size:13px;color:#28a745;margin-bottom:10px;">✅ Cleared: ${cleared.join(', ')}</div>` : ''}

      <div class="vmark-grid">
        <div>
          <button class="vmark-btn btn-o" onclick="submitV('O')" ${eliminated?'disabled':''}>O</button>
          <div class="vmark-label">Make / Clear</div>
        </div>
        <div>
          <button class="vmark-btn btn-x" onclick="submitV('X')" ${eliminated?'disabled':''}>X</button>
          <div class="vmark-label">Miss / Foul</div>
        </div>
        <div>
          <button class="vmark-btn btn-p" onclick="submitV('P')" ${eliminated?'disabled':''}>P</button>
          <div class="vmark-label">Pass height</div>
        </div>
      </div>

      <div id="attemptList" style="margin-top:12px;"></div>
    </div>`;

  renderAttemptRows(attempts);
}

async function submitV(result) {
  if (!currentAth || !currentEventId) return;
  const attempts  = allAttempts.filter(a => a.athlete_id === currentAth.id);
  const mark      = result === 'O' ? (flightBar || 'O') : result;
  const dbResult  = result === 'O' ? 'make' : result === 'P' ? 'pass' : 'foul';

  await sb.from('attempts').insert({
    meet_id: currentMeet.id, event_id: currentEventId,
    athlete_id: currentAth.id,
    attempt_number: attempts.length + 1,
    height: flightBar || null,
    mark, result: dbResult
  });

  await refreshAttempts();
}

// ── Bar height helpers ────────────────────────────────────────
function parseHeight(str) {
  const m = str && str.match(/^(\d+)-(\d{2})$/);
  return m ? parseInt(m[1]) * 12 + parseInt(m[2]) : null;
}
function toHeightStr(inches) {
  return Math.floor(inches / 12) + '-' + String(inches % 12).padStart(2, '0');
}
function incBar(n) {
  const inp = document.getElementById('barInput');
  const cur = parseHeight(inp.value.trim());
  if (cur === null) { alert('Set a valid bar height first (e.g. 12-00)'); return; }
  inp.value = flightBar = toHeightStr(cur + n);
}
function setBar() {
  const inp = document.getElementById('barInput');
  if (!parseHeight(inp.value.trim())) { alert('Enter height as feet-inches, e.g. 12-06'); return; }
  flightBar = inp.value.trim();
  renderRight();
}

// ── Elimination logic (3 consecutive non-O results at same height) ──
function isEliminated(attempts) {
  if (!attempts.length) return false;
  // Group by height — 3 consecutive X at the same height = out
  // Simple rule: 3 misses in a row (no clear between them)
  let consecutive = 0;
  for (let i = attempts.length - 1; i >= 0; i--) {
    const r = attempts[i].result;
    if (r === 'make') break;
    if (r === 'foul') { consecutive++; if (consecutive >= 3) return true; }
  }
  return false;
}

function getClearedHeights(attempts) {
  return [...new Set(attempts.filter(a => a.result === 'make').map(a => a.height || a.mark).filter(Boolean))];
}

// ── Render attempt rows ───────────────────────────────────────
function renderAttemptRows(attempts) {
  const el = document.getElementById('attemptList');
  if (!el) return;
  if (!attempts.length) {
    el.innerHTML = '<p style="text-align:center;color:#bbb;font-size:13px;margin-top:8px;">No attempts yet</p>';
    return;
  }
  // Show newest first
  const sorted = [...attempts].reverse();
  el.innerHTML = sorted.map(a => {
    const badgeClass = a.result === 'make' ? 'badge-make'
                     : a.result === 'foul' ? 'badge-foul'
                     : a.result === 'pass' ? 'badge-pass'
                     : 'badge-nh';
    const badgeLabel = a.result === 'make' ? 'MAKE'
                     : a.result === 'foul' ? 'FOUL'
                     : a.result === 'pass' ? 'PASS' : 'NH';
    const heightStr  = a.height ? `<span class="att-height">${a.height}</span>` : '';
    return `<div class="att-row">
      <span class="att-num">ATT ${a.attempt_number}</span>
      ${heightStr}
      <span class="att-mark">${a.mark || '—'}</span>
      <span class="att-badge ${badgeClass}">${badgeLabel}</span>
    </div>`;
  }).join('');
}

// ── Best mark (horizontal distance) ──────────────────────────
function getBestMark(attempts) {
  const makes = attempts.filter(a => a.result === 'make');
  if (!makes.length) return null;
  let best = null, bestVal = -1;
  makes.forEach(a => {
    const v = parseDist(a.mark);
    if (v > bestVal) { bestVal = v; best = a.mark; }
  });
  return best;
}

function parseDist(mark) {
  if (!mark) return -1;
  const ft = mark.match(/^(\d+)-(\d{2})(?:\.(\d+))?$/);
  if (ft) return parseInt(ft[1]) * 12 + parseInt(ft[2]) + (ft[3] ? parseFloat('0.' + ft[3]) : 0);
  const m = mark.match(/^(\d+(?:\.\d+)?)$/);
  if (m) return parseFloat(m[1]);
  return -1;
}

// ── Refresh attempts from DB, re-render ──────────────────────
async function refreshAttempts() {
  const { data } = await sb.from('attempts').select('*')
    .eq('event_id', currentEventId)
    .eq('meet_id',  currentMeet.id)
    .order('attempt_number');
  allAttempts = data || [];
  renderAthleteList();
  renderRight();
}
</script>
</body>
</html>
