<script>
const sb = supabase.createClient('https://qjomrnguhbqfluzwuntz.supabase.co', 'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_');

let currentMeet = null;
let currentEventId = null;
let currentAth = null;
let attemptsCache = {};
let athleteListCache = [];
let _athMap = {};
let currentPhase = '3att';
let editingAttemptId = null;

const PHASE_LIMIT = { '3att': 3, '4att': 4, 'finals': 3 };

window.onload = async () => {
  const stored = sessionStorage.getItem('fep_meet');
  if (!stored) return window.location.href = 'index.html';
  currentMeet = JSON.parse(stored);
  document.getElementById('topMeetName').textContent = currentMeet.name || 'Meet';
  await loadEvents();
};

async function loadEvents() {
  const { data } = await sb.from('events').select('*').eq('meet_id', currentMeet.id).order('name');
  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '<option value="">— Select Event —</option>';
  (data || []).forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = e.name;
    sel.appendChild(opt);
  });
}

async function loadEvent() {
  currentEventId = document.getElementById('eventSelect').value;
  if (!currentEventId) return;

  currentAth = null;
  editingAttemptId = null;

  const [{ data: assigns }, { data: attempts }] = await Promise.all([
    sb.from('event_assignments')
      .select('athlete_id, athletes!event_assignments_athlete_id_fkey(fname, lname, team)')
      .eq('event_id', currentEventId)
      .eq('meet_id', currentMeet.id),
    sb.from('attempts')
      .select('*')
      .eq('event_id', currentEventId)
      .eq('meet_id', currentMeet.id)
  ]);

  athleteListCache = (assigns || []).map(r => ({
    id: r.athlete_id,
    name: r.athletes ? `${r.athletes.fname} ${r.athletes.lname}`.trim() : 'Unknown',
    team: r.athletes?.team || ''
  }));

  attemptsCache[currentEventId] = attempts || [];

  renderAthleteList();
  document.getElementById('rightPanel').innerHTML = '<p style="text-align:center;color:#888;padding:60px;">Select an athlete →</p>';
}

function renderAthleteList() {
  const container = document.getElementById('leftPanel');
  container.innerHTML = '';

  const cache = attemptsCache[currentEventId] || [];

  let scores = athleteListCache.map(ath => {
    const best = cache
      .filter(a => a.athlete_id === ath.id && a.result === 'make')
      .map(a => parseMark(a.mark))
      .filter(v => v !== null)
      .sort((a,b) => b - a)[0] ?? -1;

    return { ...ath, best };
  });

  if (currentPhase === 'finals') {
    scores.sort((a,b) => b.best - a.best);
    scores = scores.slice(0,8);
    scores.reverse();
  }

  scores.forEach(score => {
    _athMap[score.id] = score;

    const btn = document.createElement('button');
    btn.className = `ath-btn ${currentAth && currentAth.id === score.id ? 'active' : ''}`;
    btn.innerHTML = `<span id="place_${score.id}" class="place-badge"></span>
      <strong>${score.name}</strong><br><small>${score.team}</small>`;

    btn.onclick = () => selectAth(score.id);
    container.appendChild(btn);
  });

  updatePlaceBadges();
}

function selectAth(id) {
  currentAth = _athMap[id];
  editingAttemptId = null;
  renderRightPanel();
}

function renderRightPanel() {
  if (!currentAth) return;

  const panel = document.getElementById('rightPanel');

  const myAttempts = (attemptsCache[currentEventId] || [])
    .filter(a => a.athlete_id === currentAth.id && a.phase === currentPhase);

  const limit = PHASE_LIMIT[currentPhase];
  const canAddMore = myAttempts.length < limit;

  panel.innerHTML = `
    <div class="card">
      <h2>${currentAth.name}</h2>
      <div>Phase: <strong>${currentPhase}</strong></div>
      ${!canAddMore ? '<div class="limit-msg">Max attempts reached</div>' : ''}
      <div class="mark-entry">
        <input id="hFt" type="number" placeholder="ft">
        <input id="hIn" type="number" placeholder="in">
        <select id="hQtr">
          <option value="0">.00</option>
          <option value="0.25">.25</option>
          <option value="0.5">.50</option>
          <option value="0.75">.75</option>
        </select>
      </div>
      <button onclick="saveOrUpdateMark()">SAVE</button>
      <button onclick="saveHFoul()" ${!canAddMore ? 'disabled' : ''}>FOUL</button>
    </div>

    <div class="card">
      ${myAttempts.map(a => `
        <div class="att-row">
          Att ${a.attempt_number} — ${a.mark}
          <button onclick="editAttempt('${a.id}','${a.mark}')">Edit</button>
          <button onclick="deleteAttempt('${a.id}')">Delete</button>
        </div>
      `).join('')}
    </div>
  `;
}

async function saveOrUpdateMark() {
  const ft = parseInt(hFt.value) || 0;
  const ins = parseInt(hIn.value) || 0;
  const qtr = parseFloat(hQtr.value) || 0;

  const mark = `${ft}-${(ins + qtr).toFixed(2)}`;

  if (editingAttemptId) {
    await sb.from('attempts').update({ mark }).eq('id', editingAttemptId);
    editingAttemptId = null;
  } else {
    const myAttempts = (attemptsCache[currentEventId] || [])
      .filter(a => a.athlete_id === currentAth.id && a.phase === currentPhase);

    const nextNum = Math.max(0, ...myAttempts.map(a => a.attempt_number)) + 1;

    await sb.from('attempts').insert({
      meet_id: currentMeet.id,
      event_id: currentEventId,
      athlete_id: currentAth.id,
      attempt_number: nextNum,
      mark,
      result: 'make',
      phase: currentPhase
    });
  }

  await reloadAttempts();
}

async function saveHFoul() {
  const myAttempts = (attemptsCache[currentEventId] || [])
    .filter(a => a.athlete_id === currentAth.id && a.phase === currentPhase);

  const nextNum = Math.max(0, ...myAttempts.map(a => a.attempt_number)) + 1;

  await sb.from('attempts').insert({
    meet_id: currentMeet.id,
    event_id: currentEventId,
    athlete_id: currentAth.id,
    attempt_number: nextNum,
    mark: 'FOUL',
    result: 'foul',
    phase: currentPhase
  });

  await reloadAttempts();
}

function editAttempt(id, mark) {
  editingAttemptId = id;

  if (!mark || !mark.includes('-')) return;

  const [ft, ins] = mark.split('-');
  hFt.value = ft;
  hIn.value = Math.floor(ins);
  hQtr.value = (ins % 1).toFixed(2);
}

async function deleteAttempt(id) {
  if (!confirm("Delete attempt?")) return;
  await sb.from('attempts').delete().eq('id', id);
  await reloadAttempts();
}

async function reloadAttempts() {
  const { data } = await sb.from('attempts')
    .select('*')
    .eq('event_id', currentEventId)
    .eq('meet_id', currentMeet.id);

  attemptsCache[currentEventId] = data || [];
  renderRightPanel();
  renderAthleteList();
}

function setPhase(phase) {
  currentPhase = phase;
  renderAthleteList();
  if (currentAth) renderRightPanel();
}

function updatePlaceBadges() {
  const cache = attemptsCache[currentEventId] || [];

  let scores = athleteListCache.map(ath => {
    const best = cache
      .filter(a => a.athlete_id === ath.id && a.result === 'make')
      .map(a => parseMark(a.mark))
      .filter(v => v !== null)
      .sort((a,b) => b - a)[0] ?? -1;

    return { ...ath, best };
  });

  let ranked = [...scores].sort((a,b) => b.best - a.best);

  let place = 1;
  ranked.forEach((r,i) => {
    if (i > 0 && r.best === ranked[i-1].best) {
      r.place = place;
      r.tied = true;
    } else {
      place = i + 1;
      r.place = place;
      r.tied = false;
    }
  });

  const map = {};
  ranked.forEach(r => map[r.id] = r);

  scores.forEach(s => {
    const curr = map[s.id];
    const badge = document.getElementById(`place_${s.id}`);
    if (!badge) return;

    badge.textContent = curr.best <= 0 ? '' :
      curr.tied ? `T-${curr.place}` : `${curr.place}`;
  });
}

function parseMark(mark) {
  if (!mark || !mark.includes('-')) return null;
  const [ft, ins] = mark.split('-').map(Number);
  return ft * 12 + ins;
}
</script>
