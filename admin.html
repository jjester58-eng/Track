<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <link rel="icon" type="image/png" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1b2a">
  <title>Admin — Field Events Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0a0f1a; color: #e0e6f0;
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .topbar {
      background: #0d1b2a; border-bottom: 2px solid #1e3a5f;
      padding: 12px 18px; display: flex; align-items: center;
      gap: 14px; flex-shrink: 0;
    }
    .topbar img { height: 38px; width: auto; }
    .topbar-title { font-size: 18px; font-weight: 800; color: #7eb8f7; letter-spacing: 1px; flex: 1; }
    .home-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 8px 14px; border-radius: 6px; font-size: 15px; text-decoration: none;
    }
    #lockScreen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .lock-card {
      background: #0d1b2a; border: 1px solid #1e3a5f; border-radius: 14px;
      padding: 36px 32px; max-width: 380px; width: 100%; text-align: center;
    }
    .lock-card input {
      width: 100%; padding: 14px; font-size: 22px; text-align: center;
      letter-spacing: 8px; background: #162438; border: 2px solid #1e3a5f;
      border-radius: 8px; color: #e0e6f0; outline: none; margin-bottom: 14px;
    }
    .lock-btn {
      width: 100%; padding: 14px; background: #1a3a5c; color: white;
      border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
    }
    .lock-error { color: #f87; font-size: 13px; margin-top: 10px; display: none; }
    #adminContent { display: none; flex: 1; padding: 24px 20px; max-width: 720px; margin: 0 auto; width: 100%; }
    .meet-strip { background: #0d1b2a; border: 1px solid #1e3a5f; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .meet-strip select { flex: 1; min-width: 180px; background: #162438; color: #e0e6f0; border: 1px solid #2a4a6e; border-radius: 6px; padding: 8px 12px; font-size: 14px; }
    .btn-sm-blue { padding: 8px 14px; background: #0d2a4a; color: #7eb8f7; border: 1px solid #1e5a8c; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
    .card { background: #0d1b2a; border: 1px solid #1e3a5f; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .btn-green { background: #0d2a18; color: #4dca7a; border: 1px solid #28a745; }
    .btn-red { background: #2a0a0a; color: #f87; border: 1px solid #dc3545; }
    .status-msg { display: none; margin-top: 12px; padding: 12px 14px; border-radius: 8px; font-size: 14px; font-weight: bold; }
    .status-msg.success { display: block; background: #0a2218; color: #4dca7a; }
    .status-msg.error { display: block; background: #2a0a0a; color: #f87; }
    .status-msg.info { display: block; background: #0a1a2a; color: #7eb8f7; }
  </style>
</head>
<body>

<div class="topbar">
  <img src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" alt="Logo" style="height:38px;">
  <div class="topbar-title">🔐 Admin — Field Events Pro</div>
  <a href="index.html" class="home-btn">⌂ Home</a>
</div>

<!-- Lock Screen -->
<div id="lockScreen">
  <div class="lock-card">
    <h2>🔐 Admin Access</h2>
    <p>Enter the admin password to continue.</p>
    <input type="password" id="pwInput" placeholder="••••" maxlength="20" onkeydown="if(event.key==='Enter') checkPassword()">
    <button class="lock-btn" onclick="checkPassword()">UNLOCK ADMIN</button>
    <div class="lock-error" id="lockError">❌ Incorrect password. Try again.</div>
  </div>
</div>

<!-- Admin Content -->
<div id="adminContent" style="display:none;">
  <div class="meet-strip">
    <label>Working on meet:</label>
    <select id="meetSelect" onchange="onMeetChange()">
      <option value="">— select a meet —</option>
    </select>
    <button class="btn-sm-blue" onclick="showCreateMeet()">+ New Meet</button>
  </div>

  <!-- Create Meet -->
  <div class="card" id="createMeetCard" style="display:none;">
    <h3>🏟 Create New Meet</h3>
    <div class="field-row">
      <div class="field-group" style="flex:2;"><label>Meet Name</label><input type="text" id="newMeetName" placeholder="e.g. Weatherford Invite"></div>
      <div class="field-group"><label>Date</label><input type="date" id="newMeetDate"></div>
    </div>
    <div class="field-row">
      <div class="field-group"><label>Worker PIN (4-6 digits)</label><input type="tel" id="newMeetPin" maxlength="6" placeholder="1111"></div>
    </div>
    <button class="btn btn-green" onclick="createMeet()">CREATE MEET</button>
    <button class="btn btn-red" onclick="hideCreateMeet()">CANCEL</button>
    <div class="status-msg" id="createStatus"></div>
  </div>

  <!-- Rest of your cards (logo, events, danger zone) can be added later -->
  <div class="card" id="dangerCard" style="display:none;">
    <h3>⚠️ Danger Zone</h3>
    <button class="btn btn-red" onclick="clearMeet()">DELETE ALL DATA FOR THIS MEET</button>
  </div>
</div>

<script>
// Supabase
const sb = supabase.createClient(
  'https://qjomrnguhbqfluzwuntz.supabase.co',
  'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_'
);

const ADMIN_PASSWORD = '1111';
let activeMeetId = null;
let activeMeetName = null;

// Password check
function checkPassword() {
  const input = document.getElementById('pwInput').value.trim();
  const error = document.getElementById('lockError');

  if (input === ADMIN_PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadMeetList();
  } else {
    error.style.display = 'block';
    document.getElementById('pwInput').value = '';
    setTimeout(() => error.style.display = 'none', 2500);
  }
}

// Load meets
async function loadMeetList() {
  const { data: meets, error } = await sb
    .from('meets')
    .select('id, name, date')
    .order('date', { ascending: false });

  const sel = document.getElementById('meetSelect');
  sel.innerHTML = '<option value="">— select a meet —</option>';

  (meets || []).forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = m.name + (m.date ? ' (' + new Date(m.date).toLocaleDateString() + ')' : '');
    sel.appendChild(opt);
  });
}

async function onMeetChange() {
  const id = document.getElementById('meetSelect').value;
  activeMeetId = id;
  document.getElementById('dangerCard').style.display = id ? 'block' : 'none';
}

function showCreateMeet() {
  document.getElementById('createMeetCard').style.display = 'block';
}

function hideCreateMeet() {
  document.getElementById('createMeetCard').style.display = 'none';
}

async function createMeet() {
  const name = document.getElementById('newMeetName').value.trim();
  const date = document.getElementById('newMeetDate').value;
  const pin = document.getElementById('newMeetPin').value.trim();

  if (!name || !pin) {
    alert("Meet name and PIN are required");
    return;
  }

  const { error } = await sb.from('meets').insert({ name, date, pin });
  if (error) alert("Error: " + error.message);
  else {
    alert("Meet created!");
    hideCreateMeet();
    loadMeetList();
  }
}

async function clearMeet() {
  if (!activeMeetId) return;
  if (!confirm("Delete ALL data for this meet? This cannot be undone.")) return;
  if (prompt("Enter admin password to confirm:") !== ADMIN_PASSWORD) {
    alert("Incorrect password");
    return;
  }
  // Add your delete logic here later
  alert("Data cleared (placeholder)");
}

// Make functions global
window.checkPassword = checkPassword;
window.onMeetChange = onMeetChange;
window.showCreateMeet = showCreateMeet;
window.hideCreateMeet = hideCreateMeet;
window.createMeet = createMeet;
window.clearMeet = clearMeet;
</script>
</body>
</html>
