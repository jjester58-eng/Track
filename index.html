<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://ocgmhukrxbnldlmodtwx.supabase.co/storage/v1/object/public/Photo/W.png">
  <link rel="icon" type="image/png" href="https://ocgmhukrxbnldlmodtwx.supabase.co/storage/v1/object/public/Photo/W.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Field Events">
  <meta name="theme-color" content="#0d1b2a">
  <title>Field Events Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0a0f1a;
      color: #e0e6f0;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 {
      color: #7eb8f7;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 1px;
      margin: 0 0 6px 0;
    }
    .subtitle {
      color: #4a6a8a;
      font-size: 14px;
      margin-bottom: 48px;
    }

    .btn-group {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-size: 17px;
      font-weight: 700;
      border: 1px solid transparent;
      transition: transform 0.1s, box-shadow 0.15s;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    .btn:active { transform: translateY(0); }

    .btn-icon {
      font-size: 26px;
      flex-shrink: 0;
      width: 40px;
      text-align: center;
    }
    .btn-text { flex: 1; }
    .btn-text .btn-title { display: block; }
    .btn-text .btn-sub { display: block; font-size: 12px; font-weight: 400; opacity: 0.7; margin-top: 2px; }
    .btn-arrow { font-size: 18px; opacity: 0.5; }

    .btn-scoring {
      background: #0d2a4a;
      border-color: #1e5a8c;
    }
    .btn-scoring:hover { background: #112f54; }

    .btn-results {
      background: #0a2a18;
      border-color: #1a5a30;
    }
    .btn-results:hover { background: #0d3320; }

    .btn-admin {
      background: #2a0d0d;
      border-color: #5a1a1a;
    }
    .btn-admin:hover { background: #341010; }

    .footer {
      margin-top: 52px;
      color: #2a3a4a;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="logo">⚡</div>
  <h1>FIELD EVENTS PRO</h1>
  <p class="subtitle">Texas High School Track &amp; Field</p>

  <div class="btn-group">

    <a href="scoring.html" class="btn btn-scoring">
      <span class="btn-icon">🏃</span>
      <span class="btn-text">
        <span class="btn-title">Coach Scoring</span>
        <span class="btn-sub">Record attempts &amp; manage athletes</span>
      </span>
      <span class="btn-arrow">›</span>
    </a>

    <a href="results.html" class="btn btn-results">
      <span class="btn-icon">📊</span>
      <span class="btn-text">
        <span class="btn-title">Live Leaderboard</span>
        <span class="btn-sub">Pressbox &amp; results display</span>
      </span>
      <span class="btn-arrow">›</span>
    </a>

    <a href="admin.html" class="btn btn-admin">
      <span class="btn-icon">🔐</span>
      <span class="btn-text">
        <span class="btn-title">Admin / Import Roster</span>
        <span class="btn-sub">Import CSV · reset meet data</span>
      </span>
      <span class="btn-arrow">›</span>
    </a>

  </div>

  <div class="footer">Field Events Pro · Powered by Supabase</div>

</body>
</html>
