<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <link rel="icon" type="image/png" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1b2a">
  <title>Field Events Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0a0f1a; color: #e0e6f0;
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; padding: 40px 20px 60px;
    }
    .app-logo { height: 80px; width: auto; margin-bottom: 20px; }
    h1 { color: #7eb8f7; font-size: 28px; font-weight: 900; letter-spacing: 1.5px; margin: 0 0 6px; }
    .subtitle { color: #4a6a8a; font-size: 14px; margin: 0 0 48px; }

    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #4a6a8a; width: 100%; max-width: 460px; margin-bottom: 12px; }
    .meet-list { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
    .meet-card {
      background: #0d1b2a; border: 1px solid #1e3a5f; border-radius: 14px;
      padding: 18px 20px; cursor: pointer; display: flex; align-items: center; gap: 16px;
    }
    .meet-card:hover { background: #111d2e; border-color: #2a5a8c; }
    .meet-logo { width: 52px; height: 52px; border-radius: 10px; object-fit: contain; background: #0a1422; border: 1px solid #1e3a5f; padding: 4px; }
    .meet-logo-placeholder { width: 52px; height: 52px; border-radius: 10px; background: #0a1422; border: 1px solid #1e3a5f; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .meet-info { flex: 1; }
    .meet-name { font-size: 17px; font-weight: 700; color: #d0e4ff; margin-bottom: 3px; }
    .meet-date { font-size: 13px; color: #4a6a8a; }

    .debug { background: #2a0a0a; color: #ff9; padding: 12px; border-radius: 8px; font-size: 13px; max-width: 460px; margin: 20px; white-space: pre-wrap; display: none; }
    .empty-msg { color: #888; text-align: center; padding: 40px; background: #0d1b2a; border: 1px dashed #444; border-radius: 12px; width: 100%; max-width: 460px; }
  </style>
</head>
<body>

  <img id="appLogo" src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" alt="Field Events Pro" class="app-logo">
  <h1>FIELD EVENTS PRO</h1>
  <p class="subtitle">Texas High School Track &amp; Field</p>

  <div class="section-label">Select Your Meet</div>
  <div class="meet-list" id="meetList">
    <div class="loading-msg">Loading meets…</div>
  </div>

  <a href="admin.html" class="admin-link" style="color:#4a7aaa;margin-top:20px;">🔐 Admin / Director access</a>

  <div id="debug" class="debug"></div>

<script>
const sb = Supabase.createClient(
  'https://qjomrnguhbqfluzwuntz.supabase.co',
  'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_'
);

const IRONCLAD = 'https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png';
let selectedMeet = null;

function log(msg) {
  console.log(msg);
  const d = document.getElementById('debug');
  d.style.display = 'block';
  d.innerHTML += '→ ' + msg + '\n';
}

// Load meets
window.onload = async () => {
  log("Starting to load meets...");

  try {
    const { data: meets, error } = await sb
      .from('meets')
      .select('id, name, date, logo_url')
      .eq('is_active', true)
      .order('date', { ascending: true });

    if (error) {
      log("Supabase Error: " + error.message);
      document.getElementById('meetList').innerHTML = `<div class="empty-msg">Database error: ${error.message}</div>`;
      return;
    }

    log(`Found ${meets ? meets.length : 0} active meets`);

    const list = document.getElementById('meetList');
    if (!meets || meets.length === 0) {
      list.innerHTML = `<div class="empty-msg">No active meets found.<br><br>Go to Admin and create one first.</div>`;
      return;
    }

    list.innerHTML = meets.map(m => {
      const logo = m.logo_url 
        ? `<img src="${m.logo_url}" class="meet-logo">` 
        : `<div class="meet-logo-placeholder">🏟</div>`;
      const dateStr = m.date 
        ? new Date(m.date).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) 
        : 'Date TBD';

      return `
        <div class="meet-card" onclick='openMeet(${JSON.stringify(m).replace(/"/g, '&quot;')})'>
          ${logo}
          <div class="meet-info">
            <div class="meet-name">${m.name}</div>
            <div class="meet-date">${dateStr}</div>
          </div>
          <div class="meet-arrow">›</div>
        </div>`;
    }).join('');
  } catch (err) {
    log("Unexpected error: " + err.message);
  }
};

function openMeet(meet) {
  selectedMeet = meet;
  document.getElementById('appLogo').src = meet.logo_url || IRONCLAD;
  // You can expand modal later if needed
  if (confirm(`Open ${meet.name}?\n\nScoring or Leaderboard?`)) {
    openScoring(meet);
  }
}

function openScoring(meet) {
  sessionStorage.setItem('fep_meet', JSON.stringify(meet));
  window.location.href = 'scoring.html';
}
</script>
</body>
</html>
