<script>
// ════════════════════════════════════════════════════════
// SUPABASE INIT
// ════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://qjomrnguhbqfluzwuntz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let currentEventId   = '';
let currentEventName = '';
let isVertical       = false;
let athleteList      = [];
let attemptsData     = [];
let realtimeChannel  = null;

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
window.onload = async () => {
  const { data, error } = await sb.from('events').select('*').order('name');
  if (error) { console.error(error); return; }
  const sel = document.getElementById('eventSelect');
  (data || []).forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = `${e.name} (${e.gender} ${e.level})`;
    sel.appendChild(opt);
  });
};

// ════════════════════════════════════════════════════════
// EVENT CHANGE
// ════════════════════════════════════════════════════════
async function onEventChange() {
  currentEventId = document.getElementById('eventSelect').value;
  if (!currentEventId) return;
  currentEventName = document.getElementById('eventSelect').selectedOptions[0].text.toLowerCase();
  isVertical = currentEventName.includes('high jump') || currentEventName.includes('pole vault');
  document.getElementById('barHeightCard').style.display = isVertical ? 'block' : 'none';

  // Unsubscribe from previous realtime channel
  if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }

  await fetchAll();

  // Subscribe to real-time changes on attempts for this event
  realtimeChannel = sb.channel('attempts-' + currentEventId)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'attempts',
      filter: `event_id=eq.${currentEventId}`
    }, () => { fetchAll(); })
    .subscribe();
}

// ════════════════════════════════════════════════════════
// DATA FETCH
// ════════════════════════════════════════════════════════
async function fetchAll() {
  if (!currentEventId) return;

  // Fetch athletes via event_assignments join
  const { data: assignData } = await sb
    .from('event_assignments')
    .select('athlete_id, athletes(id, fname, lname, team)')
    .eq('event_id', currentEventId);

  athleteList = (assignData || []).map(r => ({
    id:   r.athletes.id,
    name: (r.athletes.fname + ' ' + r.athletes.lname).trim(),
    team: r.athletes.team || ''
  }));

  // Fetch attempts
  const { data: attData } = await sb
    .from('attempts')
    .select('*')
    .eq('event_id', currentEventId)
    .order('ts');

  attemptsData = (attData || []).map(r => ({
    id:           r.id,
    event_id:     r.event_id,
    athlete_id:   r.athlete_id,
    athlete_name: r.athlete_name || '',
    mark:         r.mark || '',
    foul:         !!r.foul,
    pass:         !!r.pass,
    phase:        r.phase || '',
    height:       r.height || '',
    std:          r.std || '',
    ts:           r.ts || ''
  }));

  render();
}

// ════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════
function render() {
  if (isVertical) renderVLeaderboard(); else renderHLeaderboard();
  renderStatusPanel();
}

// ── HORIZONTAL LEADERBOARD ────────────────────────────
function renderHLeaderboard() {
  const places = calcHPlaces(athleteList);
  const sorted = [...athleteList].sort((a, b) => {
    const pa = places[a.id] ? (places[a.id].place || 9999) : 9999;
    const pb = places[b.id] ? (places[b.id].place || 9999) : 9999;
    return pa - pb;
  });

  const maxAtt = Math.max(1, ...athleteList.map(a =>
    attemptsData.filter(x => x.athlete_id === a.id).length
  ));
  const cols = Math.max(3, maxAtt);

  let html = `<div class="section-title">Leaderboard — ${document.getElementById('eventSelect').selectedOptions[0].text}</div>`;
  html += `<table class="lb-table"><thead><tr>
    <th class="place-cell">Place</th><th>Athlete</th><th class="center">Best</th>`;
  for (let i = 1; i <= cols; i++) html += `<th class="center">Att ${i}</th>`;
  html += `</tr></thead><tbody>`;

  sorted.forEach(a => {
    const myAtts = attemptsData.filter(x => x.athlete_id === a.id);
    const best   = getBestMark(myAtts);
    const pObj   = places[a.id];
    const badge  = placeBadge(pObj);

    html += `<tr>
      <td class="place-cell center"><span class="place-badge ${badge.cls}">${badge.text}</span></td>
      <td><div class="ath-name">${a.name}</div><div class="ath-team">${a.team || ''}</div></td>
      <td class="center">${best ? `<span class="best-mark">${best}</span>` : `<span class="no-mark">NM</span>`}</td>`;

    for (let i = 0; i < cols; i++) {
      const att = myAtts[i];
      if (!att) {
        html += `<td class="att-cell att-empty center">—</td>`;
      } else {
        const isFoul = att.foul || att.mark === 'FOUL';
        const isPass = att.pass || att.mark === 'P';
        const val    = isFoul || isPass ? null : parseMark(String(att.mark));
        const isBest = val !== null && att.mark === best;
        if (isFoul)      html += `<td class="att-cell att-foul center">F</td>`;
        else if (isPass) html += `<td class="att-cell att-pass center">P</td>`;
        else html += `<td class="att-cell center"><span class="${isBest ? 'att-best' : 'att-mark'}">${att.mark}</span></td>`;
      }
    }
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('leaderboard').innerHTML = html;
}

// ── VERTICAL LEADERBOARD ──────────────────────────────
function renderVLeaderboard() {
  const places = calcVPlaces(athleteList);
  const sorted = [...athleteList].sort((a, b) => {
    const pa = places[a.id] ? (places[a.id].place || 9999) : 9999;
    const pb = places[b.id] ? (places[b.id].place || 9999) : 9999;
    return pa - pb;
  });

  let html = `<div class="section-title">Leaderboard — ${document.getElementById('eventSelect').selectedOptions[0].text}</div>`;

  sorted.forEach(a => {
    const myAtts = attemptsData.filter(x => x.athlete_id === a.id);
    const elim   = isEliminated(myAtts);
    const best   = getVBest(myAtts);
    const pObj   = places[a.id];
    let badge    = placeBadge(pObj);
    if (elim && (!pObj || pObj.place === null)) badge = { text: 'OUT', cls: 'pOUT' };

    const heightMap = {};
    myAtts.forEach(x => { if (!x.height) return; if (!heightMap[x.height]) heightMap[x.height] = []; heightMap[x.height].push(x); });
    const sortedHeights = Object.keys(heightMap).sort((a,b) => parseHeight(a) - parseHeight(b));

    html += `<div class="v-ath-row${elim ? ' elim' : ''}">
      <div class="v-top">
        <span class="place-badge ${badge.cls}">${badge.text}</span>
        <div>
          <div class="ath-name">${a.name}</div>
          <div class="ath-team">${a.team || ''}${best ? ` &nbsp;·&nbsp; <span style="color:#4dca7a">Best: ${best}</span>` : ''}</div>
        </div>
      </div>
      <div class="v-heights">`;

    sortedHeights.forEach(ht => {
      const atts   = heightMap[ht];
      const made   = atts.some(x => x.mark === 'O');
      const misses = atts.filter(x => x.mark === 'X').length;
      const allPass = atts.every(x => x.pass || x.mark === 'P');
      const chipCls = made ? 'cleared' : misses >= 3 ? 'missed' : allPass ? 'passed' : '';
      const dots = atts.map(x =>
        x.mark === 'O' ? '<span style="color:#4dca7a">O</span>' :
        x.mark === 'X' ? '<span style="color:#e05555">X</span>' :
        x.mark === 'P' ? '<span style="color:#445566">P</span>' : ''
      ).join('');
      html += `<div class="v-ht-chip ${chipCls}"><b>${ht}</b><span>${dots}</span></div>`;
    });

    if (!sortedHeights.length) html += `<span style="color:#2a4a6a; font-size:12px;">No attempts yet</span>`;
    html += `</div></div>`;
  });

  document.getElementById('leaderboard').innerHTML = html;
}

// ── STATUS PANEL ──────────────────────────────────────
function renderStatusPanel() {
  let nowAth = null, nextAths = [];

  if (isVertical) {
    // Current bar = height of most recent attempt
    const lastAtt = attemptsData[attemptsData.length - 1];
    const curBar  = lastAtt ? lastAtt.height : null;
    document.getElementById('barHeightDisplay').textContent = curBar || '—';

    if (curBar) {
      const active = athleteList.filter(a => {
        const myAtts = attemptsData.filter(x => x.athlete_id === a.id);
        if (isEliminated(myAtts)) return false;
        const atCur = myAtts.filter(x => x.height === curBar);
        return !atCur.some(x => x.mark === 'O');
      });
      nowAth   = active[0] || null;
      nextAths = active.slice(1, 4);
    }
  } else {
    const withCounts = athleteList.map(a => ({
      ...a, count: attemptsData.filter(x => x.athlete_id === a.id).length
    }));
    const minCount = Math.min(...withCounts.map(x => x.count));
    const upList   = withCounts.filter(x => x.count === minCount);
    nowAth   = upList[0] || null;
    nextAths = withCounts.filter(x => x !== nowAth).sort((a,b) => a.count - b.count).slice(0, 3);
  }

  if (nowAth) {
    const myAtts = attemptsData.filter(x => x.athlete_id === nowAth.id);
    const best   = isVertical ? getVBest(myAtts) : getBestMark(myAtts);
    document.getElementById('nowCompeting').innerHTML = `
      <div class="competing-name">${nowAth.name}</div>
      <div class="competing-team">${nowAth.team || ''}</div>
      ${best ? `<div class="competing-best">Best: ${best}</div>` : ''}
    `;
  } else {
    document.getElementById('nowCompeting').innerHTML = '<span style="color:#2a4a6a">—</span>';
  }

  if (nextAths.length) {
    document.getElementById('upNext').innerHTML = nextAths.map((a, i) => {
      const myAtts = attemptsData.filter(x => x.athlete_id === a.id);
      const best   = isVertical ? getVBest(myAtts) : getBestMark(myAtts);
      return `<div class="up-next-row">
        <span class="up-next-num">${i + 2}</span>
        <span class="up-next-name">${a.name}</span>
        ${best ? `<span class="up-next-mark">${best}</span>` : ''}
      </div>`;
    }).join('');
  } else {
    document.getElementById('upNext').innerHTML = '<span style="color:#2a4a6a">—</span>';
  }
}

// ════════════════════════════════════════════════════════
// PLACEMENT LOGIC
// ════════════════════════════════════════════════════════
function calcHPlaces(list) {
  const markArrays = {};
  list.forEach(a => {
    markArrays[a.id] = attemptsData
      .filter(x => x.athlete_id === a.id && !x.foul && !x.pass && !['FOUL','P','X','O'].includes(x.mark))
      .map(x => parseMark(String(x.mark))).filter(v => v !== null).sort((a,b) => b-a);
  });
  const sorted = [...list].sort((a,b) => {
    const ma = markArrays[a.id], mb = markArrays[b.id];
    const len = Math.max(ma.length, mb.length);
    for (let i = 0; i < len; i++) { const va = ma[i] ?? -1, vb = mb[i] ?? -1; if (vb !== va) return vb - va; }
    return 0;
  });
  const result = {};
  let place = 1;
  for (let i = 0; i < sorted.length; i++) {
    const a = sorted[i];
    if (i === 0 || !markArraysEqual(markArrays[sorted[i-1].id], markArrays[a.id])) place = i + 1;
    result[a.id] = { place: markArrays[a.id].length > 0 ? place : null,
                     tied: i > 0 && markArraysEqual(markArrays[sorted[i-1].id], markArrays[a.id]) };
  }
  return result;
}

function markArraysEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
  return true;
}

function calcVPlaces(list) {
  const athData = list.map(a => {
    const myAtts = attemptsData.filter(x => x.athlete_id === a.id);
    const cleared = myAtts.filter(x => x.mark === 'O').map(x => parseHeight(x.height)).filter(v => v !== null);
    const bestCleared = cleared.length ? Math.max(...cleared) : null;
    const missMap = {};
    myAtts.filter(x => x.mark === 'X').forEach(x => { const h = parseHeight(x.height); if (h !== null) missMap[h] = (missMap[h]||0)+1; });
    return { id: a.id, bestCleared, missMap, eliminated: isEliminated(myAtts) };
  });
  const sorted = [...athData].sort((a, b) => {
    if (a.bestCleared === null && b.bestCleared === null) return 0;
    if (a.bestCleared === null) return 1;
    if (b.bestCleared === null) return -1;
    if (b.bestCleared !== a.bestCleared) return b.bestCleared - a.bestCleared;
    const heights = Array.from(new Set([...Object.keys(a.missMap),...Object.keys(b.missMap)])).map(Number).sort((x,y) => y-x);
    for (const h of heights) { const ma = a.missMap[h]||0, mb = b.missMap[h]||0; if (ma !== mb) return ma - mb; }
    return 0;
  });
  const result = {};
  let place = 1;
  for (let i = 0; i < sorted.length; i++) {
    const a = sorted[i];
    if (i > 0 && !vTied(a, sorted[i-1])) place = i + 1;
    result[a.id] = { place: a.bestCleared !== null ? place : null, tied: i > 0 && vTied(a, sorted[i-1]) };
  }
  return result;
}

function vTied(a, b) {
  if (a.bestCleared !== b.bestCleared) return false;
  const heights = Array.from(new Set([...Object.keys(a.missMap),...Object.keys(b.missMap)])).map(Number).sort((x,y) => y-x);
  for (const h of heights) { if ((a.missMap[h]||0) !== (b.missMap[h]||0)) return false; }
  return true;
}

function placeBadge(pObj) {
  if (!pObj || pObj.place === null) return { text: 'NM', cls: 'pNM' };
  const p = pObj.place, tied = pObj.tied;
  if (tied) return { text: `T-${p}`, cls: 'pT' };
  const cls = p <= 8 ? `p${p}` : 'pNM';
  const sfx = p===1?'st':p===2?'nd':p===3?'rd':'th';
  return { text: `${p}${sfx}`, cls };
}

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
function getBestMark(atts) {
  let best = null, bestVal = -1;
  atts.forEach(a => {
    if (a.foul || a.pass || ['FOUL','P','X','O'].includes(a.mark)) return;
    const val = parseMark(String(a.mark));
    if (val !== null && val > bestVal) { bestVal = val; best = a.mark; }
  });
  return best;
}
function getVBest(atts) {
  const cleared = atts.filter(x => x.mark === 'O').map(x => x.height).filter(Boolean);
  if (!cleared.length) return null;
  return cleared.sort((a,b) => parseHeight(b) - parseHeight(a))[0];
}
function parseMark(m) {
  if (!m || !m.includes('-')) return null;
  const p = m.split('-');
  return (parseFloat(p[0])||0)*12 + (parseFloat(p[1])||0);
}
function parseHeight(h) { return parseMark(h); }
function isEliminated(atts) {
  const m = {};
  atts.forEach(a => { if (a.mark==='X' && a.height) m[a.height]=(m[a.height]||0)+1; });
  return Object.values(m).some(v => v >= 3);
}
