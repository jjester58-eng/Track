<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <link rel="icon" type="image/png" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1b2a">
  <title>Field Events Pro — Scoring</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { 
      font-family: -apple-system, sans-serif; 
      background: #f0f2f5; margin: 0; 
      display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
    }
    .topbar { 
      background: #0d1b2a; border-bottom: 2px solid #1e3a5f; 
      padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; 
    }
    #topLogo { height: 38px; width: auto; }
    .meet-pill { 
      background: #162438; border: 1px solid #1e3a5f; border-radius: 20px; 
      padding: 4px 12px; font-size: 13px; font-weight: 700; color: #7eb8f7; 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
    }
    .topbar-title { font-size: 18px; font-weight: 800; color: #7eb8f7; flex: 1; }
    .nav-home { color: white; text-decoration: none; font-size: 20px; }
    #offlineBanner { display: none; background: #dc3545; color: white; padding: 8px; text-align: center; font-weight: bold; flex-shrink: 0; }
    #offlineBanner.show { display: block; }
    #queueBanner { display: none; background: #856404; color: #fff3cd; padding: 6px; text-align: center; font-size: 12px; }
    #queueBanner.show { display: block; }
    .event-header { background: #0d1b2a; color: white; padding: 10px 14px; flex-shrink: 0; }
    .event-header select { width: 100%; padding: 10px; background: #162438; color: white; border-radius: 6px; font-size: 14px; }
    .container { display: flex; flex: 1; overflow: hidden; }
    .left-panel { width: 42%; border-right: 2px solid #ddd; overflow-y: auto; background: white; padding: 8px; }
    .right-panel { flex: 1; overflow-y: auto; padding: 15px; background: #fdfdfd; }
    .ath-btn { 
      width: 100%; padding: 13px 14px; margin: 5px 0; 
      background: #f8f9fa; border: 1px solid #ddd; 
      text-align: left; cursor: pointer; border-radius: 6px; 
    }
    .ath-btn:hover { background: #eef4ff; }
    .ath-btn.active { background: #e6f0ff; border-left: 5px solid #1a5a8c; }
    .ath-btn.eliminated { background: #fff5f5; }
    .attempt-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; background: #f8f9fa;
      border-radius: 8px; margin-bottom: 8px;
    }
    .att-num  { font-size: 12px; font-weight: 700; color: #666; min-width: 50px; }
    .att-mark { flex: 1; font-size: 17px; font-weight: 700; }
    .att-badge {
      font-size: 11px; padding: 3px 9px; border-radius: 4px; font-weight: bold;
    }
    .att-make  { background: #0a2a18; color: #4dca7a; }
    .att-foul  { background: #2a0a0a; color: #f87; }
    .att-other { background: #1a2a3a; color: #7eb8f7; }
    .add-btn {
      width: 100%; padding: 15px; background: #155724; color: #4dca7a;
      border: 1px solid #28a745; border-radius: 8px; font-size: 16px;
      font-weight: bold; cursor: pointer; margin: 12px 0;
    }
    .add-btn:hover { background: #1a6b2e; }
    .card {
      background: white; border-radius: 10px; padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .height-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .height-controls input { width: 110px; padding: 10px; font-size: 18px; text-align: center; }
    .inc-btn { padding: 8px 12px; background: #eee; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
    .vmark-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 12px 0; }
    .vmark-btn { height: 60px; border-radius: 8px; border: none; font-size: 22px; font-weight: bold; color: white; cursor: pointer; }
    .btn-o { background: #28a745; } .btn-x { background: #dc3545; } .btn-p { background: #6c757d; }
  </style>
</head>
<body>

<div id="offlineBanner">⚠ NO CONNECTION — Attempts are being saved locally...</div>

<div class="topbar">
  <img id="topLogo" src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png" alt="Logo">
  <div class="meet-pill" id="topMeetName">Loading…</div>
  <div class="topbar-title">FIELD EVENTS PRO — SCORING</div>
  <a href="index.html" class="nav-home">⌂</a>
</div>

<div class="event-header">
  <select id="eventSelect" onchange="loadEvent()">
    <option value="">— Select Event —</option>
  </select>
</div>

<div class="container">
  <div class="left-panel" id="leftPanel">
    <div style="padding:40px;text-align:center;color:#888;">Select an event above</div>
  </div>
  <div class="right-panel" id="rightPanel">
    <div style="padding:40px;text-align:center;color:#888;">Select an athlete to record attempts</div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  'https://qjomrnguhbqfluzwuntz.supabase.co',
  'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_'
);

const IRONCLAD = 'https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png';
let currentMeet = null;
let currentAth = null;
let currentEventId = '';
let currentEventName = '';
let isVertical = false;
let hPhase = '3att';
let maxAttempts = 3;
let vPhase = 'Prelims';
let flightBarHeight = '';
let checkinStatus = {};   // athleteId → { status: 'accepted'|'passed', entryHeight: string }
let attemptsCache = {};
let athleteListCache = [];

window.onload = async () => {
  const stored = sessionStorage.getItem('fep_meet');
  if (!stored) {
    window.location.href = 'index.html';
    return;
  }
  currentMeet = JSON.parse(stored);

  document.getElementById('topLogo').src = currentMeet.logo_url || IRONCLAD;
  document.getElementById('topMeetName').textContent = currentMeet.name;

  await loadEvents();

  const banner = document.getElementById('offlineBanner');
  const checkOnline = () => banner.classList.toggle('show', !navigator.onLine);
  checkOnline();
  window.addEventListener('online', checkOnline);
  window.addEventListener('offline', checkOnline);
};

async function loadEvents() {
  const { data: events, error } = await sb
    .from('events')
    .select('*')
    .eq('meet_id', currentMeet.id)
    .order('name');

  if (error) return console.error(error);

  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '<option value="">— Select Event —</option>';

  (events || []).forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = `${e.name} ${e.gender ? '— ' + e.gender : ''} ${e.level ? '(' + e.level + ')' : ''}`;
    sel.appendChild(opt);
  });
}

async function loadEvent() {
  const eventId = document.getElementById('eventSelect').value;
  if (!eventId) return;

  currentEventId = eventId;
  currentAth = null;
  currentEventName = document.getElementById('eventSelect').selectedOptions[0].text.toLowerCase();
  isVertical = currentEventName.includes('high jump') || currentEventName.includes('pole vault');

  const left = document.getElementById('leftPanel');
  left.innerHTML = '<div style="padding:40px;text-align:center;color:#888;">Loading athletes...</div>';

  const { data: assigns, error } = await sb
    .from('event_assignments')
    .select('athlete_id, athlete_name, athletes!event_assignments_athlete_id_fkey(fname, lname, team)')
    .eq('event_id', eventId)
    .eq('meet_id', currentMeet.id);

  if (error) {
    left.innerHTML = `<div style="color:red;padding:20px;">Error: ${error.message}</div>`;
    return;
  }

  if (!assigns || assigns.length === 0) {
    left.innerHTML = '<div style="padding:30px;text-align:center;color:#888;">No athletes in this event yet.</div>';
    return;
  }

  left.innerHTML = '';
  assigns.forEach(a => {
    const ath = a.athletes || {};
    const name = ath.fname ? `${ath.fname} ${ath.lname}` : a.athlete_name;
    const btn = document.createElement('button');
    btn.className = 'ath-btn';
    btn.innerHTML = `<div style="font-weight:700;">${name}</div>${ath.team ? `<div style="font-size:13px;color:#666;">${ath.team}</div>` : ''}`;
    btn.onclick = () => selectAthlete(a.athlete_id, name, eventId);
    left.appendChild(btn);
  });
}

async function selectAthlete(athleteId, name, eventId) {
  currentAth = { id: athleteId, name };

  document.querySelectorAll('.ath-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  const { data: attempts } = await sb
    .from('attempts')
    .select('*')
    .eq('athlete_id', athleteId)
    .eq('event_id', eventId)
    .eq('meet_id', currentMeet.id)
    .order('attempt_number');

  const right = document.getElementById('rightPanel');
  right.innerHTML = `
    <div class="card">
      <h2>${name}</h2>
      <button class="add-btn" onclick="addAttempt('${athleteId}','${eventId}')">+ ADD ATTEMPT</button>
      <div id="attemptList"></div>
    </div>`;

  renderAttempts(attempts || []);
}

function renderAttempts(attempts) {
  const el = document.getElementById('attemptList');
  if (!el) return;
  if (!attempts.length) {
    el.innerHTML = '<p style="text-align:center;color:#aaa;">No attempts recorded yet.</p>';
    return;
  }
  el.innerHTML = attempts.map(a => {
    const badgeClass = a.result === 'make' ? 'att-make' : a.result === 'foul' ? 'att-foul' : 'att-other';
    return `<div class="attempt-row">
      <span class="att-num">ATT ${a.attempt_number}</span>
      <span class="att-mark">${a.mark || '—'}</span>
      <span class="att-badge ${badgeClass}">${(a.result || 'pending').toUpperCase()}</span>
    </div>`;
  }).join('');
}

async function addAttempt(athleteId, eventId) {
  const mark = prompt('Enter mark (e.g. 42-06 for horizontal, or O/X/P for vertical):');
  if (!mark) return;

  const result = mark.toUpperCase().includes('FOUL') ? 'foul' : 'make';

  const { data: existing } = await sb.from('attempts').select('attempt_number')
    .eq('athlete_id', athleteId).eq('event_id', eventId).eq('meet_id', currentMeet.id);
  const nextNum = (existing ? existing.length : 0) + 1;

  await sb.from('attempts').insert({
    meet_id: currentMeet.id,
    event_id: eventId,
    athlete_id: athleteId,
    attempt_number: nextNum,
    mark: mark.trim(),
    result
  });

  const { data: attempts } = await sb.from('attempts').select('*')
    .eq('athlete_id', athleteId).eq('event_id', eventId).eq('meet_id', currentMeet.id);
  renderAttempts(attempts || []);
}
</script>
</body>
</html>
