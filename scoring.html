      height: 100vh;

    .topbar { 
      background: #0d1b2a;

      padding: 12px 18px; 
      display: flex; 
      align-items: center; 
      gap: 12px;

      border: 2px solid #1e3a5f; 
    }
    .topbar-title { 
      font-size: 19px; 
      font-weight: 800; 
      color: #7eb8f7; 
      letter-spacing: 1px;

    }
    .nav-home { 
      background: rgba(255,255,255,0.1); 
      border: 1px solid rgba(255,255,255,0.3); 
      color: white; 
      padding: 8px 12px; 
      border-radius: 6px; 
      font-size: 18px; 
      text-decoration: none; 
    }

    #offlineBanner { display: none; background: #dc3545; color: white; font-size: 13px; font-weight: bold; text-align: center; padding: 6px 12px; flex-shrink: 0; }
    #offlineBanner.show { display: block; }
    #queueBanner { display: none; background: #856404; color: #fff3cd; font-size: 12px; text-align: center; padding: 5px 12px; flex-shrink: 0; }
    #queueBanner.show { display: block; }

    #flightBarStrip { 
      display: none; 
      background: #1e3a1e; 
      color: white; 
      padding: 8px 12px; 
      flex-shrink: 0; 
      align-items: center; 
      gap: 10px; 
      flex-wrap: wrap; 
    }
    #flightBarStrip.show { display: flex; }

    .nav-bar { background: #0d1b2a; display: flex; align-items: center; padding: 10px 12px; border-bottom: 2px solid #1a3a5c; flex-shrink: 0; gap: 12px; }
    .nav-bar button { background: none; border: 1px solid white; color: white; flex: 1; padding: 8px 14px; border-radius: 5px; cursor: pointer; font-size: 14px; }
    .nav-bar button.active { background: white; color: #0d1b2a; font-weight: bold; }
