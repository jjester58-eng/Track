<script>
// ── Init ──────────────────────────────────────────────────────
const SUPABASE_URL = 'https://qjomrnguhbqfluzwuntz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let MEET = null;

// ── Robust meet loader (NO UI changes, just logic) ─────────────
async function resolveMeet() {
  // 1. sessionStorage (primary)
  let stored = sessionStorage.getItem('fep_meet');

  // 2. fallback: localStorage
  if (!stored) stored = localStorage.getItem('fep_meet');

  if (stored) {
    try {
      MEET = JSON.parse(stored);
      return;
    } catch(e) {
      console.error('Bad stored meet JSON', e);
    }
  }

  // 3. fallback: URL param (?meet=ID)
  const params = new URLSearchParams(window.location.search);
  const meetId = params.get('meet');

  if (meetId) {
    const { data, error } = await sb
      .from('meets')
      .select('*')
      .eq('id', meetId)
      .single();

    if (error) {
      console.error('Meet fetch error:', error);
      return;
    }

    MEET = data;

    // store for future use
    sessionStorage.setItem('fep_meet', JSON.stringify(data));
    localStorage.setItem('fep_meet', JSON.stringify(data));
  }
}

// ── Page load ─────────────────────────────────────────────────
window.onload = async () => {
  await resolveMeet();

  if (!MEET) {
    console.warn('No meet found');

    document.getElementById('topMeetName').textContent = "No Meet";
    document.getElementById('leftPanel').innerHTML =
      `<div style="padding:20px;color:#c00;">No meet selected</div>`;
    return;
  }

  applyMeetBranding(MEET);

  await loadEvents();
  updateBanners();
};

// ── Load events for this meet ─────────────────────────────────
async function loadEvents() {
  const { data: events, error } = await sb
    .from('events')
    .select('*')
    .eq('meet_id', MEET.id)
    .order('name');

  if (error) {
    console.error('Events load error:', error);
    return;
  }

  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '<option value="">— Select event —</option>';

  (events || []).forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.dataset.type = e.event_type || '';
    opt.textContent = e.name + (e.gender ? ' — ' + e.gender : '') + (e.level ? ' (' + e.level + ')' : '');
    sel.appendChild(opt);
  });
}

// ── Load event (athletes for selected event) ──────────────────
async function loadEvent() {
  const eventId = document.getElementById('eventSelect').value;
  if (!eventId) return;

  const { data: assigns, error } = await sb
    .from('event_assignments')
    .select('athlete_id, athlete_name, athletes(id, fname, lname, team)')
    .eq('event_id', eventId)
    .eq('meet_id', MEET.id);

  if (error) {
    console.error('Assignments error:', error);
    return;
  }

  const left = document.getElementById('leftPanel');

  if (!assigns || !assigns.length) {
    left.innerHTML = '<div style="padding:20px;color:#888;">No athletes assigned to this event.</div>';
    return;
  }

  left.innerHTML = assigns.map(a => {
    const ath = a.athletes || {};
    const name = ath.fname ? ath.fname + ' ' + ath.lname : a.athlete_name;
    const team = ath.team || '';
    return `<button class="ath-btn" onclick="selectAthlete('${a.athlete_id}','${name.replace(/'/g,"\\'")}','${eventId}')">
      <div style="font-weight:700;font-size:14px;">${name}</div>
      ${team ? `<div style="font-size:12px;color:#888;">${team}</div>` : ''}
    </button>`;
  }).join('');
}

// ── Select athlete ────────────────────────────────────────────
async function selectAthlete(athleteId, name, eventId) {
  document.querySelectorAll('.ath-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  const { data: attempts, error } = await sb
    .from('attempts')
    .select('*')
    .eq('athlete_id', athleteId)
    .eq('event_id', eventId)
    .eq('meet_id', MEET.id)
    .order('attempt_number');

  if (error) {
    console.error('Attempts load error:', error);
    return;
  }

  const right = document.getElementById('rightPanel');
  right.innerHTML = `
    <div class="card">
      <h2 style="margin:0 0 4px;font-size:18px;">${name}</h2>
      <p style="margin:0 0 16px;color:#888;font-size:13px;">Recording attempts for this event</p>
      <div id="attemptSlots"></div>
      <button onclick="addAttempt('${athleteId}','${eventId}')"
        style="width:100%;padding:14px;background:#155724;color:#4dca7a;border:1px solid #28a745;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:8px;">
        + ADD ATTEMPT
      </button>
    </div>`;

  renderAttempts(attempts || [], athleteId, eventId);
}

// ── Add attempt ───────────────────────────────────────────────
async function addAttempt(athleteId, eventId) {
  const mark = prompt('Enter mark (e.g. 45-06 or NH or FOUL):');
  if (mark === null) return;

  const result = mark.toUpperCase().includes('FOUL') ? 'foul'
               : mark.toUpperCase() === 'NH' ? 'nh' : 'make';

  const { data: existing } = await sb.from('attempts')
    .select('attempt_number')
    .eq('athlete_id', athleteId)
    .eq('event_id', eventId)
    .eq('meet_id', MEET.id);

  const nextNum = existing ? existing.length + 1 : 1;

  const { error } = await sb.from('attempts').insert({
    athlete_id: athleteId,
    event_id: eventId,
    meet_id: MEET.id,
    mark: mark.trim(),
    result,
    attempt_number: nextNum
  });

  if (error) {
    console.error('Insert attempt error:', error);
    return;
  }

  const { data: attempts } = await sb.from('attempts')
    .select('*')
    .eq('athlete_id', athleteId)
    .eq('event_id', eventId)
    .eq('meet_id', MEET.id)
    .order('attempt_number');

  renderAttempts(attempts || [], athleteId, eventId);
}

// ── Online/offline banner ─────────────────────────────────────
function updateBanners() {
  const banner = document.getElementById('offlineBanner');
  const update = () => banner.classList.toggle('show', !navigator.onLine);
  update();
  window.addEventListener('online', update);
  window.addEventListener('offline', update);
}
</script>
