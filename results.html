<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <link rel="icon" type="image/png" href="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1b2a">
  <title>Field Events Pro — Pressbox</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0a0f1a; color: #e0e6f0;
      margin: 0; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }
    .topbar {
      background: #0d1b2a; border-bottom: 2px solid #1e3a5f;
      padding: 12px 18px; display: flex; align-items: center;
      gap: 14px; flex-shrink: 0;
    }
    #topLogo { height: 38px; width: auto; }
    .meet-pill {
      background: #162438; border: 1px solid #1e3a5f; border-radius: 20px;
      padding: 4px 12px; font-size: 13px; font-weight: 700; color: #7eb8f7;
      white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar-title {
      font-size: 19px; font-weight: 800; color: #7eb8f7;
      letter-spacing: 1px; flex: 1;
    }
    .topbar select {
      flex: 1; background: #162438; color: #e0e6f0;
      border: 1px solid #2a4a6e; border-radius: 6px;
      padding: 8px 12px; font-size: 15px;
    }
    .refresh-info {
      font-size: 13px; color: #4a7aaa; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .pulse {
      display: inline-block; width: 8px; height: 8px;
      background: #28a745; border-radius: 50%; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .main { display: flex; flex: 1; overflow: hidden; }
    .leaderboard {
      flex: 1; overflow-y: auto; padding: 16px;
      border-right: 2px solid #1e3a5f;
    }
    .status-panel {
      width: 280px; flex-shrink: 0; padding: 16px;
      background: #0d1624; overflow-y: auto;
    }

    .lb-table { width: 100%; border-collapse: collapse; }
    .lb-table th {
      background: #111d2e; color: #4a7aaa; font-size: 11px;
      text-align: left; padding: 8px 10px; border-bottom: 1px solid #1e3a5f;
    }
    .lb-table td { padding: 10px; border-bottom: 1px solid #141f30; font-size: 14px; }
    .lb-table tr:hover { background: #111d2e; }

    .place-badge {
      display: inline-block; font-size: 12px; font-weight: bold;
      padding: 3px 8px; border-radius: 4px; min-width: 32px; text-align: center;
    }
    .p1  { background: #c8a800; color: #000; }
    .p2  { background: #8a8a8a; color: #fff; }
    .p3  { background: #7a4a1a; color: #fff; }
    .p4,.p5,.p6,.p7,.p8 { background: #1e3a5f; color: #aac; }
    .pNM { background: #1a1a2a; color: #445; }

    .ath-name  { font-weight: 600; color: #d0e4ff; }
    .ath-team  { font-size: 12px; color: #4a6a8a; }
    .best-mark { font-size: 16px; font-weight: 800; color: #7eb8f7; }

    .status-card {
      background: #0d1624; border: 1px solid #1e3a5f;
      border-radius: 10px; padding: 14px; margin-bottom: 14px;
    }
    .sc-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      color: #4a7aaa; text-transform: uppercase; margin-bottom: 6px;
    }
    .no-event-msg {
      color: #2a4a6a; font-size: 15px; text-align: center; margin-top: 80px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <img id="topLogo"
       src="https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png"
       alt="Logo">
  <div class="meet-pill" id="topMeetName">Loading…</div>

  <select id="eventSelect" onchange="onEventChange()">
    <option value="">— Select event —</option>
  </select>

  <div class="refresh-info"><span class="pulse"></span>Live</div>
  <a href="index.html" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);color:white;padding:7px 12px;border-radius:6px;font-size:15px;text-decoration:none;">⌂ Home</a>
</div>

<div class="main">
  <div class="leaderboard" id="leaderboard">
    <div class="no-event-msg">Select an event above to view the live leaderboard.</div>
  </div>
  <div class="status-panel">
    <div class="status-card">
      <div class="sc-label">Now Competing</div>
      <div id="nowCompeting" style="color:#2a4a6a;font-size:14px;">—</div>
    </div>
    <div class="status-card">
      <div class="sc-label">Up Next</div>
      <div id="upNext" style="color:#2a4a6a;font-size:14px;">—</div>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  'https://qjomrnguhbqfluzwuntz.supabase.co',
  'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_'
);

let currentMeet = null;
let refreshTimer = null;

window.onload = async () => {
  const stored = sessionStorage.getItem('fep_meet');
  if (!stored) {
    window.location.href = 'index.html';
    return;
  }

  currentMeet = JSON.parse(stored);

  // Apply custom logo or fallback to Ironclad
  document.getElementById('topLogo').src = currentMeet.logo_url || 'https://qjomrnguhbqfluzwuntz.supabase.co/storage/v1/object/public/logos/Ironclad.png';
  document.getElementById('topMeetName').textContent = currentMeet.name;

  await loadEvents();
};

// Load events for this meet
async function loadEvents() {
  const { data: events, error } = await sb
    .from('events')
    .select('id, name, gender, level')
    .eq('meet_id', currentMeet.id)
    .order('name');

  const sel = document.getElementById('eventSelect');
  sel.innerHTML = '<option value="">— Select event —</option>';

  (events || []).forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = `${e.name} ${e.gender ? '— ' + e.gender : ''} ${e.level ? '(' + e.level + ')' : ''}`;
    sel.appendChild(opt);
  });
}

// When event changes
async function onEventChange() {
  clearInterval(refreshTimer);
  const eventId = document.getElementById('eventSelect').value;
  if (!eventId) {
    document.getElementById('leaderboard').innerHTML = '<div class="no-event-msg">Select an event above.</div>';
    return;
  }
  await renderLeaderboard(eventId);
  refreshTimer = setInterval(() => renderLeaderboard(eventId), 15000); // auto refresh
}

// Render leaderboard
async function renderLeaderboard(eventId) {
  // Get assignments with explicit join to avoid ambiguous relationship error
  const { data: assigns, error: assignErr } = await sb
    .from('event_assignments')
    .select(`
      athlete_id,
      athlete_name,
      athletes!event_assignments_athlete_id_fkey (fname, lname, team)
    `)
    .eq('event_id', eventId)
    .eq('meet_id', currentMeet.id);

  if (assignErr || !assigns || assigns.length === 0) {
    document.getElementById('leaderboard').innerHTML = '<div class="no-event-msg">No athletes in this event yet.</div>';
    return;
  }

  // Get all attempts for this event
  const { data: attempts } = await sb
    .from('attempts')
    .select('*')
    .eq('event_id', eventId)
    .eq('meet_id', currentMeet.id);

  // Build best mark per athlete
  const bestByAthlete = {};
  (attempts || []).forEach(a => {
    if (a.result !== 'make') return;
    const parsed = parseMark(a.mark);
    if (!bestByAthlete[a.athlete_id] || parsed > bestByAthlete[a.athlete_id].parsed) {
      bestByAthlete[a.athlete_id] = { mark: a.mark, parsed };
    }
  });

  // Build rows
  const rows = assigns.map(a => {
    const ath = a.athletes || {};
    const name = ath.fname ? `${ath.fname} ${ath.lname}` : a.athlete_name;
    const team = ath.team || '';
    const best = bestByAthlete[a.athlete_id];
    return {
      name,
      team,
      mark: best ? best.mark : null,
      parsed: best ? best.parsed : -1
    };
  });

  rows.sort((a, b) => b.parsed - a.parsed);

  // Simple place assignment
  let place = 1;
  rows.forEach((r, i) => {
    if (r.parsed < 0) {
      r.place = null;
      return;
    }
    if (i > 0 && rows[i-1].parsed === r.parsed) r.place = rows[i-1].place;
    else r.place = place++;
  });

  // Render table
  let html = `<table class="lb-table">
    <thead><tr><th>#</th><th>Athlete</th><th style="text-align:right;">Best Mark</th></tr></thead>
    <tbody>`;

  rows.forEach(r => {
    const placeHtml = r.place 
      ? `<span class="place-badge ${r.place === 1 ? 'p1' : r.place === 2 ? 'p2' : r.place === 3 ? 'p3' : 'p4'}">${r.place}</span>`
      : '<span class="place-badge pNM">—</span>';

    html += `
      <tr>
        <td>${placeHtml}</td>
        <td>
          <div class="ath-name">${r.name}</div>
          ${r.team ? `<div class="ath-team">${r.team}</div>` : ''}
        </td>
        <td style="text-align:right;" class="best-mark">${r.mark || '<span style="color:#2a4a6a;">—</span>'}</td>
      </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('leaderboard').innerHTML = html;

  // Simple status panel
  const stillCompeting = rows.filter(r => !r.mark);
  document.getElementById('nowCompeting').textContent = stillCompeting[0]?.name || '—';
  document.getElementById('upNext').textContent = stillCompeting[1]?.name || '—';
}

// Helper: parse mark like "42-06" to inches
function parseMark(mark) {
  if (!mark) return -1;
  const m = mark.match(/^(\d+)-(\d{1,2})(?:\.\d+)?$/);
  if (m) return parseInt(m[1]) * 12 + parseInt(m[2]);
  return parseFloat(mark) || -1;
}
</script>
</body>
</html>
