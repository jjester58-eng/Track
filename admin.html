<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="https://ocgmhukrxbnldlmodtwx.supabase.co/storage/v1/object/public/Photo/W.png">
  <link rel="icon" type="image/png" href="https://ocgmhukrxbnldlmodtwx.supabase.co/storage/v1/object/public/Photo/W.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Field Events">
  <meta name="theme-color" content="#0d1b2a">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Paste ALL your original CSS here (nav-bar, header, flightBarStrip, cards, buttons, athlete list, check-in panel, etc.) */
    /* Make sure #flightBarStrip { display: none; } is in your CSS initially */
  </style>
</head>
<body>

<div id="offlineBanner">⚠ NO CONNECTION — Attempts are being saved locally...</div>
<div id="queueBanner"></div>

<div class="nav-bar">
  <button id="navScore" class="active" onclick="showTab('score')">SCORING</button>
  <button id="navAdmin" onclick="showTab('admin')">ADMIN / IMPORT</button>
</div>

<!-- FLIGHT BAR - only on Scoring tab -->
<div id="flightBarStrip" style="display:none;">
  <label>FLIGHT BAR:</label>
  <input type="text" id="flightBarInput" placeholder="e.g. 7-00">
  <button class="fbar-inc" onclick="incFlightBar(2)">+2"</button>
  <button class="fbar-inc" onclick="incFlightBar(6)">+6"</button>
  <button class="fbar-inc" onclick="incFlightBar(12)">+1'</button>
  <button id="flightBarSet" onclick="setFlightBar()">SET BAR ▶</button>
  <span id="flightBarDisplay"></span>
</div>

<!-- SCORING TAB -->
<div id="tabScore" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
  <!-- Paste your full original scoring content here (header, athleteList, entryUI, hEntry, vEntry, etc.) -->
</div>

<!-- ADMIN TAB - Clean -->
<div id="tabAdmin" class="hidden" style="padding:30px; background:#f8f9fa; overflow-y:auto;">
  <div style="max-width:620px; margin:0 auto; background:white; padding:30px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1);">
    <h2>Admin Tools</h2>
    
    <h3 style="margin-top:25px;">Import Meet Roster</h3>
    <p style="color:#666;">Upload your MileSplit CSV file</p>
    <input type="file" id="csvFile" accept=".csv" style="margin:15px 0; width:100%;">
    <button id="impBtn" onclick="doImport()" style="width:100%; padding:16px; background:#28a745; color:white; border:none; border-radius:8px; font-size:16px; font-weight:bold;">RUN IMPORT</button>
  </div>

  <div style="max-width:620px; margin:25px auto; background:white; padding:30px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1);">
    <h3>Reset Meet</h3>
    <p style="color:#666;">This will delete all athletes and results.</p>
    <button onclick="clearMeet()" style="width:100%; padding:16px; background:#dc3545; color:white; border:none; border-radius:8px; font-size:16px; font-weight:bold;">DELETE ALL DATA</button>
  </div>
</div>

<script>
// ====================== SUPABASE ======================
const supabaseUrl = 'https://qjomrnguhbqfluzwuntz.supabase.co';
const supabaseAnonKey = 'sb_publishable_EkuLnkxIC-nZue4ss2NyJw_jmuXcpd_';
const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

// ====================== ADMIN PASSWORD ======================
const ADMIN_PASSWORD = "1111";

// ====================== TAB SWITCHING ======================
function showTab(tab) {
  if (tab === 'admin') {
    const pw = prompt("Enter Admin Password:");
    if (pw !== ADMIN_PASSWORD) {
      alert("❌ Incorrect password");
      return;
    }
  }

  document.getElementById('tabScore').style.display = tab === 'score' ? 'flex' : 'none';
  document.getElementById('tabAdmin').classList.toggle('hidden', tab !== 'admin');
  document.getElementById('navScore').classList.toggle('active', tab === 'score');
  document.getElementById('navAdmin').classList.toggle('active', tab === 'admin');

  // Hide flight bar on Admin
  document.getElementById('flightBarStrip').style.display = (tab === 'score') ? 'flex' : 'none';
}

// ====================== IMPORT ======================
async function doImport() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) return alert('Please select a CSV file');

  const btn = document.getElementById('impBtn');
  btn.textContent = 'IMPORTING...';
  btn.disabled = true;

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const count = await importMileSplitToSupabase(e.target.result);
      alert(`✅ Successfully imported ${count} athletes!`);
      // Optionally reload or refresh data
    } catch (err) {
      alert('Import failed: ' + err.message);
    } finally {
      btn.textContent = 'RUN IMPORT';
      btn.disabled = false;
    }
  };
  reader.readAsText(file);
}

async function importMileSplitToSupabase(csvText) {
  // Basic parser - you can expand this
  const lines = csvText.trim().split('\n');
  return lines.length - 1; // placeholder count
}

async function clearMeet() {
  const pw = prompt("Enter Admin Password:");
  if (pw !== ADMIN_PASSWORD) return alert("Incorrect password");

  if (!confirm("Delete ALL data? This cannot be undone.")) return;

  await supabase.from('attempts').delete().neq('id', '0');
  await supabase.from('event_assignments').delete().neq('id', '0');
  await supabase.from('athletes').delete().neq('id', '0');
  await supabase.from('events').delete().neq('id', '0');

  alert("All data cleared.");
  location.reload();
}

// Start on scoring tab
window.onload = () => {
  showTab('score');
};
</script>
</body>
</html>
